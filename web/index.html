<title>twin</title>
<style>
  :root {
    --bg: #faf9f7; --panel: #ffffff; --ink: #22201d; --muted: #8a857c;
    --line: #eae7e1; --accent: #c96442; --accent-soft: #f5e9e3; --user: #eef1f4;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  [hidden] { display: none !important; }   /* beats component display:flex/grid */
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, "SF Pro Text", system-ui, sans-serif;
  }
  .shell { display: grid; grid-template-columns: 264px 1fr 296px; height: 100vh; overflow: hidden; }

  /* ---- rail (scrolls independently of the main area) ---- */
  .rail { border-right: 1px solid var(--line); background: var(--panel); padding: 20px 16px; display: flex; flex-direction: column; overflow-y: auto; min-height: 0; }
  .brand { font-weight: 650; font-size: 16px; letter-spacing: -0.01em; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .navitem { padding: 7px 10px; border-radius: 8px; color: var(--muted); font-size: 14px; cursor: pointer; }
  .navitem.active { background: var(--accent-soft); color: var(--ink); }
  .navlabel { text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.09em; color: var(--muted); margin: 22px 4px 8px; }
  .profile, .sources { flex: none; }
  .pf-row { display: grid; grid-template-columns: 84px 1fr; gap: 8px; padding: 5px 6px; border-radius: 7px; }
  .pf-row:hover { background: var(--bg); }
  .pf-k { color: var(--muted); font-size: 12px; text-transform: capitalize; }
  .pf-v { font-size: 13px; }
  #profile-root:empty::after { content: "nothing yet — the agent is still getting to know you."; color: var(--muted); font-size: 12.5px; font-style: italic; }
  #sources-root:empty::after { content: "no data yet — point the agent at a file or run a skill."; color: var(--muted); font-size: 12.5px; font-style: italic; }
  #skills-root:empty::after { content: "no skills loaded."; color: var(--muted); font-size: 12.5px; font-style: italic; }
  .src-row { padding: 6px; border-radius: 7px; }
  .src-row:hover { background: var(--bg); }
  #sources-root .src-row { cursor: pointer; }
  #sources-root .src-row:hover { background: var(--accent-soft); }
  .src-n { font-size: 13px; font-weight: 550; }
  .src-d { font-size: 11.5px; color: var(--muted); }

  /* ---- agent rail (right): what the agent is doing, live ---- */
  .agent-rail { border-right: none; border-left: 1px solid var(--line); }
  .agent-rail .navlabel:first-child { margin-top: 0; }
  .agent-now { font-size: 12.5px; color: var(--muted); display: flex; align-items: center; gap: 7px; padding: 2px 4px 6px; }
  .now-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex: none; }
  .agent-now.on .now-dot { background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  #agenda-root:empty::after { content: "no agenda yet — the agent plans its own work here."; color: var(--muted); font-size: 12px; font-style: italic; }
  #findings-root:empty::after { content: "nothing flagged yet."; color: var(--muted); font-size: 12px; font-style: italic; }
  #activity-root:empty::after { content: "quiet so far."; color: var(--muted); font-size: 12px; font-style: italic; }
  .ag-row { display: flex; gap: 8px; align-items: baseline; padding: 5px 6px; border-radius: 7px; font-size: 12.5px; }
  .ag-row .ag-t { flex: 1; min-width: 0; }
  .ag-s { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); border: 1px solid var(--line); padding: 1px 7px; border-radius: 99px; flex: none; }
  .ag-row.active .ag-s { color: var(--accent); border-color: var(--accent); }
  .ag-row.done { opacity: .55; }
  .ag-row.done .ag-t { text-decoration: line-through; }
  .fnd { border: 1px solid var(--line); border-left: 3px solid var(--line); border-radius: 9px; padding: 8px 10px; margin: 6px 0; font-size: 12.5px; background: var(--panel); }
  .fnd.sev-info { border-left-color: var(--accent); }
  .fnd.sev-warn { border-left-color: #d9902a; }
  .fnd.sev-critical { border-left-color: #c0392b; }
  .fnd-m { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .act-row { font-size: 11.5px; color: var(--muted); padding: 3px 6px; border-radius: 6px; line-height: 1.45; }
  /* agent-authored lenses (Artifacts page): the card carries the lens's lineage */
  #lenses-root:empty::after { content: "no lenses yet — as the agent works, the derived views it authors appear here with their code and lineage."; color: var(--muted); font-size: 13px; font-style: italic; }
  #lenses-root .src-row { cursor: pointer; }
  .lens-code { font-family: ui-monospace, "SF Mono", monospace; font-size: 11px; background: var(--bg); border: 1px solid var(--line); padding: 8px 10px; border-radius: 8px; margin-top: 10px; white-space: pre-wrap; word-break: break-word; color: #6b665e; }

  /* ---- main ---- */
  .main { display: flex; flex-direction: column; min-width: 0; min-height: 0; overflow: hidden; }
  .topbar { padding: 14px 28px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 14px; font-weight: 600; margin: 0; flex: none; }
  .search-box { flex: 1; max-width: 420px; margin: 0 20px; border: 1px solid var(--line); background: var(--bg); border-radius: 9px; padding: 7px 12px; font: inherit; font-size: 13px; color: var(--ink); outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .status.live .dot { background: #4a9d5b; }

  .section-view { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; padding: 40px; }
  .empty { max-width: 440px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.6; }
  .empty b { color: var(--ink); display: block; margin-bottom: 6px; font-size: 15px; }

  /* ---- Data page (its own view) ---- */
  .datapage { flex: 1; min-height: 0; overflow: auto; padding: 22px 28px; }
  .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
  #sources-root:empty::after { content: "no data yet — point the agent at a file or run a skill."; color: var(--muted); font-size: 13px; font-style: italic; }
  .data-grid .src-row { border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; cursor: pointer; background: var(--panel); transition: border-color .12s, background .12s; }
  .data-grid .src-row:hover { border-color: var(--accent); background: var(--accent-soft); }
  .data-grid .src-n { font-size: 15px; font-weight: 600; text-transform: capitalize; }
  .data-grid .src-d { font-size: 12.5px; margin-top: 4px; }
  #skills-root .src-row { cursor: default; }
  #skills-root .src-row:hover { border-color: var(--line); background: var(--panel); }
  .skill-files { font-size: 11px; color: var(--muted); margin-top: 10px; font-family: ui-monospace, "SF Mono", monospace; }

  .feedwrap { flex: 1; min-height: 0; overflow-y: auto; }
  .feed { max-width: 720px; margin: 0 auto; padding: 28px 28px 8px; display: flex; flex-direction: column; gap: 4px; }
  .feed-item { padding: 8px 0; animation: rise .28s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .feed-item.agent .text { font-size: 15.5px; }
  .feed-item.user { display: flex; justify-content: flex-end; }
  .feed-item.user .text { background: var(--user); padding: 9px 14px; border-radius: 14px 14px 3px 14px; max-width: 78%; }
  .feed-item.thought { padding: 2px 0 6px; }
  .feed-item.thought::before { content: "Thought process"; display: block; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .feed-item.thought .text { color: var(--muted); font-size: 13.5px; font-style: italic; }
  .feed-item.system { padding: 4px 0; }
  .feed-item.system .text { display: inline-block; background: var(--accent-soft); color: #7a4a38; font-size: 12.5px; padding: 5px 11px; border-radius: 8px; }
  .feed-item.question { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; margin: 6px 0; box-shadow: 0 1px 2px rgba(0,0,0,.02); }
  .feed-item.question .q-text { font-weight: 550; margin-bottom: 12px; }
  .q-option { display: block; width: 100%; text-align: left; background: var(--bg); border: 1px solid var(--line); border-radius: 9px; padding: 10px 13px; margin: 6px 0; font: inherit; color: var(--ink); cursor: pointer; transition: background .12s, border-color .12s; }
  .q-option:hover { background: var(--accent-soft); border-color: var(--accent); }

  /* ---- inline agent views (rich visuals rendered into the conversation) ---- */
  .feed-item.view { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px; margin: 8px 0; box-shadow: 0 1px 2px rgba(0,0,0,.02); }
  .view-title { font-weight: 550; font-size: 13.5px; margin-bottom: 10px; }
  .view-body { min-height: 0; }
  .view-scroll { overflow-x: auto; max-height: 60vh; overflow-y: auto; }
  .feed-item.view .doc-frame { width: 100%; height: 62vh; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
  .feed-item.view .doc-img { max-width: 100%; border: 1px solid var(--line); border-radius: 8px; }

  /* ---- data explorer ---- */
  .explorer { flex: 1; min-height: 0; overflow: auto; padding: 20px 28px; }
  #explorer-root table, .view-body table { border-collapse: collapse; width: 100%; font-size: 13px; }
  #explorer-root th, .view-body th { text-align: left; position: sticky; top: 0; background: var(--bg); color: var(--muted); font-weight: 500; padding: 8px 11px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  #explorer-root td, .view-body td { padding: 6px 11px; border-bottom: 1px solid var(--line); white-space: nowrap; max-width: 320px; overflow: hidden; text-overflow: ellipsis; }
  #explorer-root tr:hover td, .view-body tr:hover td { background: var(--bg); }
  .explorer-note { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  #explorer-root .chartable { cursor: pointer; }
  #explorer-root .chartable:hover td { background: var(--accent-soft); }
  /* chart lens */
  .chart { width: 100%; height: auto; max-height: 72vh; display: block; }
  .chart-line { fill: none; stroke: var(--accent); stroke-width: 1.5; }
  .chart-axis { stroke: var(--line); stroke-width: 1; }
  .chart-lbl { fill: var(--muted); font-size: 11px; text-anchor: end; }
  .chart-bar { fill: var(--accent); opacity: .82; }
  .chart-xlbl { fill: var(--muted); font-size: 11px; }
  .chart-xlbl.endlbl { text-anchor: end; }
  /* view-mode switcher */
  .view-modes { display: flex; gap: 6px; margin-bottom: 14px; }
  .mode-btn { border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 5px 13px; font: inherit; font-size: 12.5px; color: var(--muted); cursor: pointer; }
  .mode-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--ink); }
  /* asset hierarchy tree */
  .tree { font-size: 13px; line-height: 1.5; }
  .tree-node { padding: 3px 6px; white-space: nowrap; cursor: pointer; border-radius: 5px; }
  .tree-node:hover { background: var(--accent-soft); }
  .tree-name { font-weight: 550; }
  .tree-desc { color: var(--muted); }
  .tree-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(--muted); margin-right: 9px; vertical-align: middle; }
  .tree-dot.on { background: var(--accent); border-color: var(--accent); }
  .tree-badge { color: var(--muted); font-size: 11px; }
  /* asset dashboard */
  .ad-name { font-size: 21px; font-weight: 650; margin-top: 6px; }
  .ad-desc { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .ad-section { font-size: 11.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; margin: 24px 0 10px; }
  .ad-empty { color: var(--muted); font-style: italic; font-size: 13px; }
  .sens-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px; }
  .sens-row { border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; cursor: pointer; background: var(--panel); transition: border-color .12s, background .12s; }
  .sens-row:hover { border-color: var(--accent); background: var(--accent-soft); }
  .sens-n { font-size: 12.5px; font-weight: 500; }
  .sens-u { color: var(--muted); font-size: 12px; }
  .issue-card { border: 1px solid var(--line); border-left: 3px solid var(--line); border-radius: 9px; padding: 10px 12px; cursor: pointer; background: var(--panel); transition: background .12s; }
  .issue-card:hover { background: var(--accent-soft); }
  .issue-card.sev-amber { border-left-color: #d9902a; }
  .issue-card.sev-blue { border-left-color: var(--accent); }
  /* document viewer lens */
  .doc-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 12px; }
  .doc-item { border: 1px solid var(--line); border-radius: 10px; padding: 14px; cursor: pointer; background: var(--panel); transition: border-color .12s, background .12s; }
  .doc-item:hover { border-color: var(--accent); background: var(--accent-soft); }
  .doc-name { font-size: 13px; font-weight: 550; word-break: break-all; }
  .doc-type { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  .doc-back { color: var(--accent); cursor: pointer; font-size: 13px; margin-bottom: 12px; display: inline-block; }
  .doc-frame { width: 100%; height: 78vh; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
  .doc-img { max-width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #fff; }

  .working { max-width: 720px; margin: 0 auto; padding: 4px 28px 10px; height: 22px; color: var(--muted); font-size: 13px; display: none; align-items: center; gap: 8px; }
  .working.on { display: flex; }
  .spin { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--accent-soft); border-top-color: var(--accent); animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- composer ---- */
  .composer { border-top: 1px solid var(--line); background: var(--panel); padding: 14px 28px 18px; }
  .composer-inner { max-width: 720px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; background: var(--bg); border: 1px solid var(--line); border-radius: 14px; padding: 8px 8px 8px 14px; }
  .composer textarea { flex: 1; border: none; background: transparent; resize: none; font: inherit; color: var(--ink); outline: none; max-height: 140px; padding: 6px 0; }
  .composer button { border: none; background: var(--accent); color: #fff; border-radius: 10px; width: 34px; height: 34px; font-size: 16px; cursor: pointer; flex: none; }
  .hint { max-width: 720px; margin: 6px auto 0; color: var(--muted); font-size: 11.5px; text-align: center; }
</style>

<div class="shell">
  <aside class="rail">
    <div class="brand"><span class="dot"></span> twin</div>
    <div class="nav">
      <div class="navitem active" data-view="workspace">Workspace</div>
      <div class="navitem" data-view="data">Data</div>
      <div class="navitem" data-view="watch">Watch</div>
      <div class="navitem" data-view="skills">Skills</div>
      <div class="navitem" data-view="artifacts">Artifacts</div>
      <div class="navitem" data-view="tasks">Tasks</div>
      <div class="navitem" data-view="scheduled">Scheduled</div>
    </div>
    <div class="navlabel">About you</div>
    <div class="profile" id="profile-root"></div>
  </aside>

  <section class="main">
    <div class="topbar">
      <h1 id="viewtitle">Workspace</h1>
      <input id="search" class="search-box" placeholder="Search the twin…" autocomplete="off">
      <div class="status" id="status"><span class="dot"></span><span id="statustext">connecting…</span></div>
    </div>
    <div class="feedwrap" id="feedwrap"><div class="feed" id="feed-root"></div></div>
    <div class="datapage" id="data-view" hidden><div id="sources-root" class="data-grid"></div></div>
    <div class="datapage" id="skills-view" hidden><div id="skills-root" class="data-grid"></div></div>
    <div class="datapage" id="artifacts-view" hidden><div id="lenses-root" class="data-grid"></div></div>
    <div class="section-view" id="section-view" hidden><div class="empty" id="section-empty"></div></div>
    <div class="explorer" id="explorer-view" hidden><div id="explorer-root"></div></div>
    <div class="working" id="working"><span class="spin"></span> the agent is thinking…</div>
    <div class="composer" id="composer">
      <div class="composer-inner">
        <textarea id="input" rows="1" placeholder="Reply to the agent, or point it at data…"></textarea>
        <button id="send" title="Send">↑</button>
      </div>
      <div class="hint">The agent leads. You supply what it can't know — your goals, your data, your judgment.</div>
    </div>
  </section>

  <aside class="rail agent-rail">
    <div class="navlabel">Agent</div>
    <div class="agent-now" id="agent-now"><span class="now-dot"></span><span id="agent-now-text">idle</span></div>
    <div class="navlabel">Agenda</div>
    <div id="agenda-root"></div>
    <div class="navlabel">Findings</div>
    <div id="findings-root"></div>
    <div class="navlabel">Activity</div>
    <div id="activity-root"></div>
  </aside>
</div>

<script>
(() => {
  "use strict";
  // Thin host: keep Map<Key,Node>, apply the forward mutation IR (§11.3), send back
  // the backward event stream (§11.4). Roots are pre-seeded from the static shell.
  const nodes = new Map();
  ["feed-root", "profile-root", "sources-root", "skills-root", "explorer-root",
   "agenda-root", "activity-root", "findings-root", "lenses-root"]
    .forEach((id) => nodes.set(id, document.getElementById(id)));

  const feedwrap = document.getElementById("feedwrap");
  const statusEl = document.getElementById("status");
  const statusText = document.getElementById("statustext");
  const workingEl = document.getElementById("working");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const sectionView = document.getElementById("section-view");
  const sectionEmpty = document.getElementById("section-empty");
  const explorerView = document.getElementById("explorer-view");
  const dataView = document.getElementById("data-view");
  const skillsView = document.getElementById("skills-view");
  const artifactsView = document.getElementById("artifacts-view");
  const viewTitle = document.getElementById("viewtitle");
  const composer = document.getElementById("composer");
  const agentNow = document.getElementById("agent-now");
  const agentNowText = document.getElementById("agent-now-text");

  let ws;
  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => { statusEl.classList.add("live"); statusText.textContent = "live"; };
    ws.onclose = () => {
      statusEl.classList.remove("live"); statusText.textContent = "reconnecting…";
      setTimeout(connect, 1000);
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "mutations") { msg.batch.forEach(applyMutation); autoscroll(); }
      else if (msg.type === "status") {
        // foreground turns show the in-feed spinner; background turns pulse the rail
        const on = !!msg.working, bg = !!msg.background;
        workingEl.classList.toggle("on", on && !bg);
        agentNow.classList.toggle("on", on);
        agentNowText.textContent = on ? (bg ? "working in the background…" : "thinking…") : "idle";
        autoscroll();
      }
    };
  }

  const insertAt = (parent, el, i) => parent.insertBefore(el, parent.children[i] || null);
  const SVG_NS = "http://www.w3.org/2000/svg";
  const SVG_TAGS = new Set(["svg", "path", "line", "text", "g", "circle", "rect", "polyline", "polygon"]);

  // wire the interactions the twin's rendered elements imply (all keyed by logical id)
  function wire(el, key) {
    if (/^sr:[^:]+$/.test(key)) el.addEventListener("click", () => openSource(key.slice(3)));
    else if (/^exp:r:\d+$/.test(key)) el.addEventListener("click", () => { if (el.dataset.series) send({ type: "fetch", adapter: el.dataset.adapter || "cognite-datapoints", id: el.dataset.series, label: el.dataset.label || el.dataset.series }); });
    else if (key.startsWith("doc:") && !key.endsWith(":n") && !key.endsWith(":t")) el.addEventListener("click", () => send({ type: "open_document", name: key.slice(4) }));
    else if (key === "exp:back") el.addEventListener("click", () => { showView("explorer", "documents"); send({ type: "open_source", name: "documents" }); });
    else if (key.startsWith("mode:")) el.addEventListener("click", () => { const [, name, mode] = key.split(":"); showView("explorer", name); send({ type: "open_source", name, mode }); });
    else if (/^tn:[^:]+$/.test(key)) el.addEventListener("click", () => { showView("explorer", "Asset"); send({ type: "open_asset", id: key.slice(3) }); });
    else if (/^sens:[^:]+$/.test(key)) el.addEventListener("click", () => { if (el.dataset.series) { showView("explorer", el.dataset.label || "Sensor"); send({ type: "fetch", adapter: el.dataset.adapter || "cognite-datapoints", id: el.dataset.series, label: el.dataset.label || el.dataset.series }); } });
    else if (key === "ad:back") el.addEventListener("click", () => { showView("explorer", "assets"); send({ type: "open_source", name: "assets", mode: "tree" }); });
    else if (/^iss:[^:]+:\d+:\d+$/.test(key)) el.addEventListener("click", () => { showView("explorer", "Asset"); send({ type: "open_asset", id: key.split(":")[1] }); });
    else if (/^ln:[^:]+$/.test(key)) el.addEventListener("click", () => { const n = "lens:" + key.slice(3); showView("explorer", n); send({ type: "open_source", name: n }); });
  }

  function applyMutation(m) {
    switch (m.op) {
      case "create": {
        const el = SVG_TAGS.has(m.tag) ? document.createElementNS(SVG_NS, m.tag) : document.createElement(m.tag);
        el.dataset.key = m.key;
        nodes.set(m.key, el);
        const parent = nodes.get(m.parent);
        if (parent) insertAt(parent, el, m.index);
        wire(el, m.key);
        break;
      }
      case "move": { const el = nodes.get(m.key), p = nodes.get(m.parent); if (el && p) insertAt(p, el, m.index); break; }
      case "setText": { const el = nodes.get(m.key); if (el && document.activeElement !== el) el.textContent = m.text; break; }
      case "setAttr": { const el = nodes.get(m.key); if (el) { if (m.value == null) el.removeAttribute(m.name); else el.setAttribute(m.name, m.value); } break; }
      case "setProp": { const el = nodes.get(m.key); if (el) el[m.name] = m.value; break; }
      case "remove": { const el = nodes.get(m.key); if (el) el.remove(); nodes.delete(m.key); break; }
      case "listen": {
        const el = nodes.get(m.key);
        if (el && m.key.startsWith("option:")) el.addEventListener("click", () => send({ type: "choose", target: m.key }));
        break;
      }
    }
  }

  function autoscroll() {
    if (feedwrap.hidden) return;
    if (feedwrap.scrollHeight - feedwrap.scrollTop - feedwrap.clientHeight < 160) {
      feedwrap.scrollTop = feedwrap.scrollHeight;
    }
  }

  function send(ev) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(ev)); }

  function submitMessage() {
    const text = input.value.trim();
    if (!text) return;
    showView("workspace");
    send({ type: "user_message", text });
    input.value = ""; input.style.height = "auto";
  }
  input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = input.scrollHeight + "px"; });
  input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitMessage(); } });
  sendBtn.addEventListener("click", submitMessage);

  // ---- view switching ----
  const SECTIONS = {
    tasks: ["Tasks", "The agent's agenda lives in the rail on the right — it plans its own work there and you can follow along as items go open → active → done."],
    scheduled: ["Scheduled", "Nothing scheduled yet. Once the twin has data, the agent can set up recurring jobs — a nightly data-quality check, or re-deriving views when a source changes."],
  };
  const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
  function showView(view, title) {
    document.querySelectorAll(".navitem").forEach((n) => n.classList.toggle("active", n.dataset.view === view));
    viewTitle.textContent = title || (view === "data" ? "Data in the twin" : cap(view));
    const isWorkspace = view === "workspace";
    const isSection = SECTIONS[view] != null;
    feedwrap.hidden = !isWorkspace;
    composer.hidden = !isWorkspace;
    workingEl.style.display = isWorkspace ? "" : "none";
    dataView.hidden = view !== "data";
    skillsView.hidden = view !== "skills";
    artifactsView.hidden = view !== "artifacts";
    sectionView.hidden = !isSection;
    explorerView.hidden = view !== "explorer";
    if (isSection) { const [t, b] = SECTIONS[view]; sectionEmpty.innerHTML = `<b>${t}</b>${b}`; }
  }
  document.querySelectorAll(".navitem").forEach((item) =>
    item.addEventListener("click", () => {
      const v = item.dataset.view;
      if (v === "watch") { showView("explorer", "Watch"); document.querySelectorAll(".navitem").forEach((n) => n.classList.toggle("active", n === item)); send({ type: "watch" }); }
      else showView(v);
    }));

  // search — the parametrized lens, driven from the topbar (debounced)
  const searchBox = document.getElementById("search");
  let searchTimer;
  searchBox.addEventListener("input", () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      showView("explorer", "Search");
      send({ type: "search", query: searchBox.value.trim() });
    }, 220);
  });

  function openSource(name) {
    showView("explorer", name);
    send({ type: "open_source", name });
  }

  connect();
})();
</script>
