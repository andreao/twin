<title>Vardøger</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#faf9f7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Vardøger">
<style>
  :root {
    --bg: #faf9f7; --panel: #ffffff; --ink: #22201d; --muted: #8a857c;
    --line: #eae7e1; --accent: #c96442; --accent-soft: #f5e9e3; --user: #eef1f4;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  [hidden] { display: none !important; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, "SF Pro Text", system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden;
    -webkit-tap-highlight-color: transparent; overscroll-behavior: none;
  }

  /* ---- one header: brand · starred · recents · live ---- */
  .top {
    display: flex; align-items: center; gap: 14px; height: calc(50px + env(safe-area-inset-top, 0px));
    padding: env(safe-area-inset-top, 0px) calc(18px + env(safe-area-inset-right, 0px)) 0 calc(18px + env(safe-area-inset-left, 0px));
    background: var(--panel); border-bottom: 1px solid var(--line); flex: none;
  }
  .brand { font-weight: 650; font-size: 16px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 9px; flex: none; }
  .brand svg { display: block; }
  .chips { display: flex; align-items: center; gap: 6px; min-width: 0; overflow-x: auto; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  #stars-root { flex: none; max-width: 40%; }
  #recents-root { flex: 1; }
  #recents-root:not(:empty)::before { content: "recent"; color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; margin-right: 2px; flex: none; }
  .chip { border: 1px solid var(--line); background: var(--bg); color: var(--ink); border-radius: 99px; padding: 4px 12px; font: inherit; font-size: 12px; cursor: pointer; white-space: nowrap; flex: none; transition: border-color .12s, background .12s; }
  .chip:hover { border-color: var(--accent); background: var(--accent-soft); }
  .chip.starred { color: #7a4a38; background: var(--accent-soft); border-color: #eeddd4; }
  /* the project switcher lives beside the brand; its menu reuses the run-control menu */
  .proj { position: relative; flex: none; }
  .proj-chip { font-weight: 600; }
  .proj .status-menu { left: 0; right: auto; }
  .proj .status-menu button.current { color: #7a4a38; background: var(--accent-soft); }
  /* the creation form, in the app's own grammar */
  .proj-form { display: flex; flex-direction: column; gap: 8px; padding: 8px; min-width: 270px; }
  .proj-form input { border: 1px solid var(--line); background: var(--bg); border-radius: 8px; padding: 7px 11px; font: inherit; font-size: 12.5px; color: var(--ink); outline: none; }
  .proj-form input:focus { border-color: var(--accent); }
  .proj-form-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 2px; }
  .proj-form .fd-btn { padding: 5px 13px; font-size: 12.5px; }
  .status { position: relative; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; flex: none; margin-left: auto; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
  .status:hover { background: var(--bg); }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .status.live .dot { background: #4a9d5b; }
  .status.live.paused .dot { background: #d9902a; }
  /* the twin's run control: click the live chip → pause/resume background work */
  .status-menu { position: absolute; top: 30px; right: 0; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 10px 28px rgba(30,26,20,.12); padding: 4px; display: none; z-index: 30; min-width: 200px; }
  .status-menu.open { display: block; }
  .status-menu button { display: block; width: 100%; text-align: left; border: none; background: none; font: inherit; font-size: 12.5px; padding: 8px 11px; border-radius: 7px; cursor: pointer; color: var(--ink); }
  .status-menu button:hover { background: var(--accent-soft); }
  .status-menu .menu-note { font-size: 11px; color: var(--muted); padding: 2px 11px 6px; }

  /* ---- chat front and center; detail stack slides in on the right ---- */
  .app { flex: 1; min-height: 0; display: flex; overflow: hidden; }
  .conv { position: relative; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--panel); flex: 1; }
  .conv .conv-rz { display: none; }
  .app.split .conv .conv-rz { display: block; }
  .app.split .conv { flex: none; width: 464px; border-right: 1px solid var(--line); }
  .feedwrap { flex: 1; min-height: 0; overflow-y: auto; }
  .feed { max-width: 760px; margin: 0 auto; padding: 22px 24px 8px; display: flex; flex-direction: column; gap: 4px; }
  .feed-item { padding: 8px 0; animation: rise .28s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .feed-item.agent .text { font-size: 15px; }
  .feed-item.user { display: flex; justify-content: flex-end; }
  .feed-item.user .text { background: var(--user); padding: 9px 14px; border-radius: 14px 14px 3px 14px; max-width: 82%; }
  /* the agent's reasoning is SPEECH, exactly like its messages — one voice.
     (Cards are reserved for clickable nouns: sources, lenses, findings, views.) */
  .feed-item.thought .text { font-size: 15px; }
  .feed-item.system { padding: 4px 0; }
  .feed-item.system .text { display: inline-block; background: var(--accent-soft); color: #7a4a38; font-size: 12.5px; padding: 5px 11px; border-radius: 8px; }
  .feed-item.question { background: var(--bg); border: 1px solid var(--line); border-radius: 14px; padding: 15px 16px; margin: 6px 0; }
  .feed-item.question .q-text { font-weight: 550; margin-bottom: 12px; }
  .q-option { display: block; width: 100%; text-align: left; background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 9px 13px; margin: 6px 0; font: inherit; color: var(--ink); cursor: pointer; transition: background .12s, border-color .12s; }
  .q-option:hover { background: var(--accent-soft); border-color: var(--accent); }

  /* inline agent views — cards in the conversation; the title opens them in depth */
  .feed-item.view { background: var(--bg); border: 1px solid var(--line); border-radius: 14px; padding: 13px 14px; margin: 8px 0; }
  .view-title { font-weight: 550; font-size: 13px; margin-bottom: 10px; }
  .view-title.openable, .card-title.openable { cursor: pointer; }
  .view-title.openable:hover, .card-title.openable:hover { color: var(--accent); }

  /* compact action cards: work that was done, as chat history */
  .feed-item.card { background: var(--bg); border: 1px solid var(--line); border-left: 3px solid var(--line); border-radius: 12px; padding: 10px 14px; margin: 5px 0; }
  .card-title { font-weight: 600; font-size: 13px; }
  .card-sub { color: var(--muted); font-size: 12px; margin-top: 3px; line-height: 1.5; }
  .card-sub:empty, .card-meta:empty { display: none; }
  .card-meta { color: var(--muted); font-size: 11.5px; margin-top: 4px; }

  /* a finding, opened: severity chip · the issue · where · what you can do */
  .fd-sev { display: inline-block; font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; font-weight: 600; padding: 3px 10px; border-radius: 99px; margin-bottom: 12px; }
  .fd-sev.sev-info { background: var(--accent-soft); color: #7a4a38; }
  .fd-sev.sev-warn { background: #f7ead4; color: #8a5a14; }
  .fd-sev.sev-critical { background: #f7dcd6; color: #8a2e20; }
  .fd-sev.resolved { background: #e7efe7; color: #3f6b48; }
  .fd-text { font-size: 15px; line-height: 1.6; max-width: 58ch; }
  .fd-src { color: var(--muted); font-size: 12px; margin-top: 10px; cursor: pointer; }
  .fd-src:hover { color: var(--accent); }
  .fd-cta { display: flex; gap: 8px; margin-top: 20px; }
  .fd-btn { border: 1px solid var(--line); background: var(--panel); border-radius: 9px; padding: 7px 15px; font: inherit; font-size: 13px; color: var(--ink); cursor: pointer; transition: border-color .12s, background .12s; }
  .fd-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .fd-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .fd-btn.primary:hover { opacity: .9; }
  .fnd { cursor: pointer; }
  .fnd.resolved { opacity: .5; }
  .fnd.resolved > div:first-child { text-decoration: line-through; }

  /* what's happening + task pages: ONE row shape for plan and activity alike —
     a small label column, then the text */
  .agent-block { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 6px 10px; margin-bottom: 18px; }
  .act-row { display: flex; gap: 12px; align-items: baseline; font-size: 13px; padding: 7px 8px; line-height: 1.5; border-bottom: 1px solid var(--line); }
  .act-row:last-child { border-bottom: none; }
  .act-verb { flex: none; width: 68px; color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; padding-top: 1px; }
  .act-content { flex: 1; min-width: 0; }
  .act-text { flex: 1; min-width: 0; color: var(--ink); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  /* the quiet facts line: numbers, errors, lineage — never mixed into the prose */
  .act-detail { color: var(--muted); font-size: 11.5px; margin-top: 2px; line-height: 1.45; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .act-row.t-error .act-verb { color: #8a2e20; font-weight: 700; }
  /* the live now-row: verb chip glows while the agent is actually computing */
  .now-row .act-text { color: var(--muted); }
  .now-row.on .act-text { color: var(--ink); }
  .now-row.on .now-verb { color: var(--accent); font-weight: 700; animation: nowpulse 1.5s ease-in-out infinite; }
  @keyframes nowpulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  .act-row.t-error .act-detail { color: #8a2e20; opacity: .75; }
  .act-row.t-warn .act-verb { color: #8a5a14; font-weight: 700; }
  .act-row[data-title], .act-row.openable { cursor: pointer; }
  .act-row[data-title]:hover .act-text, .act-row.openable:hover .act-text { color: var(--accent); }
  .act-open { flex: none; color: var(--muted); font-size: 14px; align-self: center; }
  .act-row.openable:hover .act-open { color: var(--accent); }
  .act-row.is-now .act-verb { color: var(--accent); font-weight: 700; }
  .act-row.is-done { opacity: .55; }
  .act-row.is-done .act-text { text-decoration: line-through; }

  /* a task's page: title once (the panel tab just says Task), then one header row
     (status chip + actions), then the work as a transcript with a live edge */
  .task-title { font-size: 17px; font-weight: 650; line-height: 1.45; max-width: 58ch; }
  .task-now { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12.5px; margin-top: 8px; }
  .now-dot.live { background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
  /* the active plan row IS the live surface: a pulsing dot on its label, and its
     latest work note (.agent-live) as the row's own quiet line — no now-strip */
  .act-row.is-now .act-verb::before { content: ""; display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.1s ease-in-out infinite; margin-right: 6px; vertical-align: baseline; }
  .task-head { margin-top: 14px; align-items: center; }
  .task-head .fd-sev { margin-bottom: 0; }
  /* the task transcript IS the chat, verbatim: it reuses .feed-item text and
     cards, and the panel body goes white like the conversation so the same
     classes render the same pixels.  Only two additions: the issue tag, and
     the "every step" toggle into the machine log. */
  .panel-body:has(> .story) { background: var(--panel); }
  .story { display: flex; flex-direction: column; gap: 4px; margin: 14px 0 10px; padding-top: 10px; border-top: 1px solid var(--line); max-width: 68ch; }
  /* an issue's text is a sentence, not a name — regular weight, reading size */
  .card-title.issue-t { font-weight: 400; font-size: 13.5px; line-height: 1.55; }
  .story-tag { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: .07em; font-weight: 650; padding: 2px 9px; border-radius: 99px; margin-bottom: 7px; }
  .story-tag.tag-warn { background: #f7ead4; color: #8a5a14; }
  .story-tag.tag-crit { background: #f7dcd6; color: #8a2e20; }
  .steps-toggle { border: 1px solid var(--line); background: var(--panel); border-radius: 7px; padding: 3px 11px; font: inherit; font-size: 11px; color: var(--muted); cursor: pointer; margin-bottom: 10px; }
  .steps-toggle:hover { border-color: var(--accent); color: var(--accent); }
  /* task status chips share the finding-chip grammar */
  .fd-sev.task-active { background: var(--accent-soft); color: #7a4a38; }
  .fd-sev.task-open { background: var(--bg); color: var(--muted); border: 1px solid var(--line); }
  .fd-sev.task-done { background: #e7efe7; color: #3f6b48; }
  .view-body { min-height: 0; }
  .view-scroll { overflow-x: auto; max-height: 44vh; overflow-y: auto; }
  .feed-item.view .doc-frame { width: 100%; height: 44vh; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
  .feed-item.view .doc-img { max-width: 100%; border: 1px solid var(--line); border-radius: 8px; }

  /* ONE live-status surface: the status bar below the composer.  (No second
     in-progress card above the chat — that was a duplicate status bar.) */

  .composer { padding: 8px 18px 0; }
  .composer-inner { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; background: var(--bg); border: 1px solid var(--line); border-radius: 14px; padding: 8px 8px 8px 14px; }
  .composer textarea { flex: 1; border: none; background: transparent; resize: none; font: inherit; color: var(--ink); outline: none; max-height: 140px; padding: 6px 0; }
  .composer button { border: none; background: var(--accent); color: #fff; border-radius: 10px; width: 34px; height: 34px; font-size: 16px; cursor: pointer; flex: none; }

  /* ---- the status bar (Claude Code-style): background work at a glance ---- */
  .statusbar { max-width: 760px; margin: 0 auto; width: 100%; padding: 7px 24px calc(10px + env(safe-area-inset-bottom, 0px)); font-size: 12px; color: var(--muted); display: flex; align-items: baseline; gap: 9px; cursor: pointer; flex: none; }
  .statusbar:hover #status-open { color: var(--accent); }
  .statusbar > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .now-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex: none; align-self: center; }
  .statusbar.on .now-dot { background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  #status-line { flex: 1; min-width: 0; }
  #status-open { flex: none; margin-left: auto; color: var(--muted); }

  /* ---- the detail stack: horizontal columns, Finder-style ---- */
  .stack { flex: 1; min-width: 0; display: none; overflow-x: auto; overflow-y: hidden; background: var(--bg); }
  .app.split .stack { display: flex; }
  .panel { position: relative; width: 520px; flex: none; min-height: 0; display: flex; flex-direction: column; border-right: 1px solid var(--line); background: var(--bg); }
  .panel:last-child { flex: 1 0 auto; border-right: none; }
  .panel-head { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--line); flex: none; background: var(--panel); }
  .panel-title { font-weight: 600; font-size: 13.5px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .panel-btn { border: none; background: none; color: var(--muted); font: inherit; font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 6px; flex: none; }
  .panel-btn:hover { background: var(--accent-soft); color: var(--accent); }
  /* phone-only: ‹ walks back one column (the last one returns to the chat) */
  .panel-back { display: none; font-size: 19px; line-height: 1; padding: 2px 10px 4px 2px; }
  /* sticky table headers pin flush to the top: the scroller has NO top padding
     (padding there leaves a see-through strip above a sticky th) */
  .panel-body { flex: 1; min-height: 0; overflow: auto; padding: 0 16px 16px; }
  .panel-body > *:first-child { margin-top: 14px; }
  .panel-body > table:first-child { margin-top: 0; }
  /* draggable divider on every column's right edge (and the chat's) */
  .panel-rz, .conv-rz { position: absolute; top: 0; right: -3px; width: 7px; height: 100%; cursor: col-resize; z-index: 6; }
  .panel-rz:hover, .conv-rz:hover { background: linear-gradient(to right, transparent 2px, var(--accent) 3px, transparent 5px); }
  /* a column split vertically: the bottom half is its own page (alt-click opens here) */
  .panel.vsplit .panel-body { flex: 1 1 55%; }
  .panel-sub { flex: 1 1 45%; min-height: 0; display: flex; flex-direction: column; border-top: 1px solid var(--line); }
  .panel-sub-head { display: flex; align-items: center; gap: 8px; padding: 7px 16px; border-bottom: 1px solid var(--line); flex: none; background: var(--bg); }
  .panel-sub-body { flex: 1; min-height: 0; overflow: auto; padding: 0 16px 16px; }
  .panel-sub-body > *:first-child { margin-top: 12px; }
  /* anything wired to open something reads as clickable, and what you clicked
     stays visibly selected while its page is open to the right */
  .opens { cursor: pointer; }
  .opens.sel { background: var(--accent-soft); border-radius: 7px; }
  tr.opens.sel td { background: var(--accent-soft); }

  /* board (inside its panel): the twin as a grid of lens tiles */
  .board-grid { display: grid; grid-template-columns: 1fr; gap: 10px; align-items: start; }
  #board-root:empty::after {
    content: "Your twin is empty. Point the agent at data, or just talk to it — every source it mounts and every lens it builds appears here, with its lineage.";
    display: block; color: var(--muted); font-size: 13px; font-style: italic; line-height: 1.6;
  }
  #board-root > div { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; transition: border-color .12s, background .12s; }
  #board-root > .src-row { cursor: pointer; }
  #board-root > .src-row:hover { border-color: var(--accent); background: var(--accent-soft); }
  .src-n { font-size: 14px; font-weight: 600; }
  .src-desc { font-size: 12.5px; color: var(--ink); margin-top: 5px; line-height: 1.45; }
  .src-d { font-size: 11.5px; color: var(--muted); margin-top: 7px; }
  .tile-h { font-size: 13.5px; font-weight: 600; margin-bottom: 8px; }
  .lens-code { font-family: ui-monospace, "SF Mono", monospace; font-size: 11px; line-height: 1.6; background: #f4f2ee; border: 1px solid var(--line); padding: 10px 12px; border-radius: 8px; margin: 2px 0 12px; white-space: pre-wrap; word-break: break-word; color: #55504a; max-height: 200px; overflow-y: auto; }
  /* the derivation breadcrumb: each hop a chip — ancestors are doorways, the
     current lens emphasized — with the code behind a toggle at the far end */
  .lens-chain { margin: 10px 0 2px; display: flex; align-items: center; flex-wrap: wrap; gap: 7px; }
  .chain-part { border: 1px solid var(--line); background: var(--panel); border-radius: 99px; padding: 2px 11px; font: inherit; font-size: 11.5px; color: var(--ink); }
  button.chain-part { cursor: pointer; transition: border-color .12s, background .12s; }
  button.chain-part:hover { border-color: var(--accent); background: var(--accent-soft); }
  .chain-part.here { background: var(--accent-soft); border-color: #eeddd4; color: #7a4a38; font-weight: 600; }
  .chain-sep { color: var(--muted); font-size: 11px; }
  /* one small button at the line's far end, in the UI face — mono is for the code itself */
  .code-toggle { margin-left: auto; border: 1px solid var(--line); background: var(--panel); border-radius: 7px; padding: 2px 10px; font: inherit; font-size: 11px; color: var(--muted); cursor: pointer; }
  .code-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .fnd-list { max-height: 300px; overflow-y: auto; }
  .fnd { border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; margin: 6px 0; font-size: 12.5px; background: var(--bg); }
  .fnd:hover { border-color: var(--accent); }
  .fnd-m { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .pf-row { display: grid; grid-template-columns: 88px 1fr; gap: 8px; padding: 4px 0; }
  .pf-k { color: var(--muted); font-size: 12px; text-transform: capitalize; }
  .pf-v { font-size: 13px; }

  /* content lenses inside panels */
  /* a table panel scrolls ONLY its rows: the header block (description, chain,
     note, field guide) stays put while the data moves under the sticky th row */
  .panel-body:has(> .table-scroll) { display: flex; flex-direction: column; overflow: hidden; }
  .panel-body:has(> .table-scroll) > * { flex: none; }
  .panel-body:has(> .table-scroll) > .table-scroll { flex: 1 1 auto; min-height: 0; }
  .table-scroll { overflow: auto; margin: 0 -16px -16px; padding: 0 16px 16px; }
  /* virtualized tables: row height is PINNED so scroll offset ↔ row index is exact
     arithmetic on both ends; the spacer rows carry the off-screen height */
  .vtable tbody td { height: 29px; padding: 0 10px; line-height: 29px; }
  .vtable .vspace td { height: auto; padding: 0; border: none; }
  .vtable .vspace:hover td { background: none; }
  .panel-body table, .view-body table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  .panel-body th, .view-body th { text-align: left; position: sticky; top: 0; background: var(--bg); color: var(--muted); font-weight: 500; padding: 7px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  .panel-body td, .view-body td { padding: 5px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
  .panel-body tr:hover td, .view-body tr:hover td { background: var(--panel); }
  .explorer-note { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  /* the schema as a page: reference cells are doorways to the schema they name */
  .sch-field { font-family: ui-monospace, "SF Mono", monospace; font-size: 11.5px; }
  .sch-desc { white-space: normal !important; min-width: 180px; }
  .sch-ref { color: var(--accent); cursor: pointer; }
  .sch-ref:hover { text-decoration: underline; }
  /* the schema as a map: sources and lenses as nodes, references and derivations as edges */
  .schema-map { width: 100%; height: auto; display: block; }
  .sm-node { cursor: pointer; }
  .sm-node rect { fill: var(--panel); stroke: var(--line); stroke-width: 1; }
  .sm-node:hover rect { stroke: var(--accent); fill: var(--accent-soft); }
  .sm-t { font-size: 12px; font-weight: 600; fill: var(--ink); }
  .sm-m { font-size: 10px; fill: var(--muted); }
  .sm-edge { stroke: var(--muted); stroke-width: 1.2; opacity: .5; }
  .sm-edge.derive { stroke-dasharray: 4 3; opacity: .35; }
  .sm-lbl { font-size: 9.5px; fill: var(--muted); }
  .panel-body .chartable { cursor: pointer; }
  .panel-body .chartable:hover td { background: var(--accent-soft); }
  .chart { width: 100%; height: auto; max-height: 66vh; display: block; }
  .chart-line { fill: none; stroke: var(--accent); stroke-width: 1.5; }
  /* the depth-log view: curve tracks along measured depth, picks as markers */
  .depth-track { fill: none; stroke: var(--line); }
  .depth-pick { stroke: #8a5a14; stroke-width: 1; stroke-dasharray: 5 4; }
  .pick-lbl { fill: #8a5a14; }
  /* evidence under an answer: exact phrases quoted from documents */
  .msg-quote { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 8px 12px; margin-top: 7px; font-size: 13px; font-style: italic; color: #5c5850; }
  .msg-quote.openable { cursor: pointer; }
  .msg-quote.openable:hover { border-color: var(--accent); background: var(--accent-soft); }
  .msg-steps { color: var(--muted); font-size: 11.5px; margin-top: 6px; }
  .chart-axis { stroke: var(--line); stroke-width: 1; }
  .chart-lbl { fill: var(--muted); font-size: 11px; text-anchor: end; }
  .chart-bar { fill: var(--accent); opacity: .82; }
  .chart-xlbl { fill: var(--muted); font-size: 11px; }
  .chart-xlbl.endlbl { text-anchor: end; }
  .view-modes { display: flex; gap: 6px; margin-bottom: 14px; }
  .mode-btn { border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 5px 13px; font: inherit; font-size: 12.5px; color: var(--muted); cursor: pointer; }
  .mode-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--ink); }
  .tree { font-size: 13px; line-height: 1.5; }
  .tree-node { padding: 3px 6px; white-space: nowrap; cursor: pointer; border-radius: 5px; }
  .tree-node:hover { background: var(--accent-soft); }
  .tree-name { font-weight: 550; }
  .tree-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(--muted); margin-right: 9px; vertical-align: middle; }
  .tree-dot.on { background: var(--accent); border-color: var(--accent); }
  .tree-badge { color: var(--muted); font-size: 11px; }
  .ad-name { font-size: 19px; font-weight: 650; margin-top: 2px; }
  .ad-desc { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .ad-section { font-size: 11.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; margin: 22px 0 10px; }
  .ad-empty { color: var(--muted); font-style: italic; font-size: 13px; }
  .sens-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .sens-row { border: 1px solid var(--line); border-radius: 9px; padding: 9px 12px; cursor: pointer; background: var(--panel); transition: border-color .12s, background .12s; }
  .sens-row:hover { border-color: var(--accent); background: var(--accent-soft); }
  .sens-n { font-size: 12.5px; font-weight: 500; }
  .sens-u { color: var(--muted); font-size: 12px; }
  .issue-card { border: 1px solid var(--line); border-left: 3px solid var(--line); border-radius: 9px; padding: 9px 12px; cursor: pointer; background: var(--panel); transition: background .12s; }
  .issue-card:hover { background: var(--accent-soft); }
  .issue-card.sev-amber { border-left-color: #d9902a; }
  .issue-card.sev-blue { border-left-color: var(--accent); }
  .doc-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .doc-item { border: 1px solid var(--line); border-radius: 10px; padding: 13px; cursor: pointer; background: var(--panel); transition: border-color .12s, background .12s; }
  .doc-item:hover { border-color: var(--accent); background: var(--accent-soft); }
  .doc-name { font-size: 13px; font-weight: 550; word-break: break-all; }
  .doc-type { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  .doc-frame { width: 100%; height: 74vh; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
  .doc-img { max-width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #fff; }

  /* ---- the wider visualization set ---- */
  .chart-dot { fill: var(--accent); opacity: .45; }
  /* calendar: months stack; a day cell carries its count, shaded by how busy */
  .cal-month { margin: 14px 0 4px; max-width: 460px; }
  .cal-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-wd { text-align: center; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; padding: 2px 0; }
  .cal-day { position: relative; border: 1px solid var(--line); border-radius: 7px; min-height: 40px; padding: 3px 5px; background: var(--panel); }
  .cal-day.c1 { background: #f8efe9; }
  .cal-day.c2 { background: var(--accent-soft); }
  .cal-day.c3 { background: #efcfc0; }
  .cal-n { font-size: 10.5px; color: var(--muted); }
  .cal-c { position: absolute; right: 5px; bottom: 3px; font-size: 11.5px; font-weight: 600; color: #7a4a38; }
  /* board: lanes side by side, cards stacked, counts as chips */
  .kanban { display: flex; gap: 10px; align-items: flex-start; overflow-x: auto; padding-bottom: 8px; }
  .klane { flex: none; width: 230px; background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 8px; }
  .klane-h { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 12.5px; font-weight: 600; padding: 2px 4px 8px; }
  .klane-c { border: 1px solid var(--line); background: var(--panel); border-radius: 99px; padding: 1px 9px; font-size: 11px; font-weight: 500; color: var(--muted); }
  .kcard { background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 7px 10px; margin: 5px 0; }
  .kcard-t { font-size: 12.5px; line-height: 1.45; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .kcard-d { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .kcard-more { color: var(--muted); font-size: 11.5px; font-style: italic; padding: 5px 4px 1px; }
  /* reading view: entries as a document, not cells */
  .rd-sec { margin: 16px 0 20px; max-width: 68ch; }
  .rd-h { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .rd-t { font-size: 14px; font-weight: 650; }
  .rd-d { color: var(--muted); font-size: 12px; }
  /* rendered markdown: the agent's rich-text surface */
  .md-body { font-size: 14px; line-height: 1.65; max-width: 68ch; }
  .md-body p { margin: 7px 0; }
  .md-body .md-h1 { font-size: 16px; font-weight: 700; margin: 14px 0 6px; }
  .md-body .md-h2 { font-size: 14.5px; font-weight: 650; margin: 12px 0 5px; }
  .md-body .md-h3, .md-body .md-h4 { font-size: 13px; font-weight: 650; margin: 10px 0 4px; }
  .md-body ul, .md-body ol { margin: 6px 0; padding-left: 22px; }
  .md-body li { margin: 3px 0; }
  .md-body code { font-family: ui-monospace, "SF Mono", monospace; font-size: 12px; background: #f4f2ee; border: 1px solid var(--line); border-radius: 4px; padding: 0 4px; }
  .md-body pre { font-family: ui-monospace, "SF Mono", monospace; font-size: 11.5px; line-height: 1.6; background: #f4f2ee; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  .md-body a { color: var(--accent); }
  /* a view embedded in rendered text (a note, a dashboard): a framed slot */
  .md-embed { margin: 14px 0; padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel); max-width: none; }
  .md-embed-t { font-size: 13px; font-weight: 650; margin-bottom: 8px; }
  .md-embed .explorer-note { margin-bottom: 8px; }
  .md-embed .view-scroll { max-height: 40vh; }

  /* ---- the phone: one thing on screen at a time ---- */
  @media (max-width: 720px) {
    .brand-name { display: none; }
    .top { gap: 8px; padding-left: calc(12px + env(safe-area-inset-left, 0px)); padding-right: calc(12px + env(safe-area-inset-right, 0px)); }
    #stars-root { max-width: 32%; }
    .feed { padding: 16px 14px 8px; }
    .feed-item.user .text { max-width: 88%; }
    .composer { padding: 8px 10px 0; }
    .statusbar { padding-left: 14px; padding-right: 14px; }
    /* iOS zooms any focused field under 16px — keep inputs at 16 so it never does */
    .composer textarea, .proj-form input { font-size: 16px; }
    /* the detail stack takes the whole screen: columns become pages; swipe between
       them (snap), ‹ walks back, the last ‹ returns to the chat */
    .app.split .conv { display: none; }
    .stack { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .panel, .panel:last-child { width: 100% !important; min-width: 100%; flex: none !important; scroll-snap-align: start; scroll-snap-stop: always; border-right: none; }
    .panel-back { display: block; }
    .panel-head { padding: 8px 10px; }
    .panel-body, .panel-sub-body { padding: 0 14px calc(14px + env(safe-area-inset-bottom, 0px)); }
    .doc-frame { height: 62vh; height: 62dvh; }
    .doc-gallery { grid-template-columns: 1fr; }
    .fd-text { max-width: none; }
  }

  /* ---- touch: fingers, not cursors ---- */
  @media (pointer: coarse) {
    .panel-rz, .conv-rz { display: none !important; }
    .chip { padding: 7px 14px; font-size: 13px; }
    .panel-btn { font-size: 17px; padding: 6px 10px; }
    .panel-back { font-size: 22px; padding: 4px 12px 6px 4px; }
    .q-option { padding: 12px 14px; }
    .fd-btn { padding: 10px 16px; }
    .composer button { width: 40px; height: 40px; border-radius: 12px; }
    .status { padding: 8px 10px; }
    .status-menu button { padding: 11px 12px; }
    .mode-btn { padding: 8px 14px; }
    .steps-toggle, .code-toggle { padding: 6px 12px; }
  }
</style>

<header class="top">
  <div class="brand">
    <svg width="21" height="21" viewBox="0 0 24 24" aria-hidden="true">
      <!-- the vardøger: the twin that walks ahead — a leading self and its echo -->
      <circle cx="14.5" cy="11" r="7" fill="none" stroke="#c96442" stroke-width="2.2"/>
      <circle cx="8" cy="13.5" r="7" fill="none" stroke="#c96442" stroke-width="1.2" opacity="0.45"/>
    </svg>
    <span class="brand-name">Vardøger</span>
  </div>
  <!-- the project switcher: a project is a completely separate everything -->
  <div class="proj" id="proj">
    <button class="chip proj-chip" id="proj-name"></button>
    <div class="status-menu" id="proj-menu"></div>
  </div>
  <div class="chips" id="stars-root"></div>
  <div class="chips" id="recents-root"></div>
  <div class="status" id="status"><span class="dot"></span><span id="statustext">connecting…</span></div>
</header>

<div class="app" id="app">
  <!-- the conversation: front and center, time as the vertical axis -->
  <section class="conv">
    <div class="feedwrap" id="feedwrap"><div class="feed" id="feed-root"></div></div>
    <div class="composer" id="composer">
      <div class="composer-inner">
        <textarea id="input" rows="1" placeholder="Ask, steer, or point the agent at data…"></textarea>
        <button id="send" title="Send">↑</button>
      </div>
    </div>
    <!-- the status bar: what's running in the background — click to open the twin -->
    <div class="statusbar" id="statusbar" title="See what the agent is doing">
      <span class="now-dot"></span>
      <span id="status-line">idle</span>
      <span id="agent-act" hidden></span>
      <span id="agent-plan" hidden></span>
      <span id="agent-doing" hidden></span>
      <span id="agent-doing-id" hidden></span>
      <span id="status-open">the twin ▸</span>
    </div>
  </section>

  <!-- the detail stack: everything you open lands here, columns push right -->
  <div class="stack" id="stack"></div>
</div>
<div id="skills-root" hidden></div>

<script>
(() => {
  "use strict";
  // Thin host: keep Map<Key,Node>, apply the forward mutation IR (§11.3), send back
  // the backward event stream (§11.4).  The detail stack's panel chrome (title /
  // star / close) is client furniture; panel BODIES are registered as roots the
  // server renders into with p<i>:-prefixed keys.
  const nodes = new Map();
  ["feed-root", "skills-root", "agent-plan", "agent-act", "agent-doing", "agent-doing-id", "stars-root", "recents-root"]
    .forEach((id) => nodes.set(id, document.getElementById(id)));

  // the twin board is a LIVE node: it exists detached from birth, grows as the agent
  // works, and is simply adopted by a panel when opened (and orphaned on close).
  const boardRoot = document.createElement("div");
  boardRoot.id = "board-root";
  boardRoot.className = "board-grid";
  nodes.set("board-root", boardRoot);

  // ---- where the twin node lives: same-origin when this page is served BY the node
  // (a browser tab); a stored host when the page is a bundled shell (the Tauri app on
  // a phone) — then the live menu grows a "Twin node…" form to point it somewhere.
  const SAME_ORIGIN = /^https?:$/.test(location.protocol);
  const nodeHost = () => (localStorage.getItem("twin-host") || "127.0.0.1:8080").replace(/^[a-z]+:\/\//, "").replace(/\/+$/, "");
  const HTTP_BASE = SAME_ORIGIN ? "" : "http://" + nodeHost();
  const WS_BASE = SAME_ORIGIN
    ? (location.protocol === "https:" ? "wss://" : "ws://") + location.host
    : "ws://" + nodeHost();

  // ---- the project: one slug from the URL; the socket, and so everything, is scoped by it ----
  const slugify = (s) => String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  const PROJECT = slugify(new URLSearchParams(location.search).get("project")) || "default";
  const projName = document.getElementById("proj-name");
  const projMenu = document.getElementById("proj-menu");
  projName.textContent = PROJECT;
  // the chip and the tab carry the project's TITLE, not its slug
  const fetchProjects = async () => { try { return await (await fetch(HTTP_BASE + "/projects")).json(); } catch (_) { return []; } };
  fetchProjects().then((list) => {
    const me = list.find((p) => p.slug === PROJECT);
    if (me && me.title) {
      projName.textContent = me.title;
      document.title = `Vardøger · ${me.title}`;
    }
  });
  const gotoProject = (p) => {
    location.href = location.pathname + (p === "default" ? "" : "?project=" + encodeURIComponent(p));
  };
  // the creation form lives IN the popover, in the app's own grammar — no browser prompt
  function newProjectForm() {
    projMenu.textContent = "";
    const form = document.createElement("div");
    form.className = "proj-form";
    const name = document.createElement("input");
    name.placeholder = "Project name";
    const desc = document.createElement("input");
    desc.placeholder = "One line: what is it about?";
    const row = document.createElement("div");
    row.className = "proj-form-row";
    const create = document.createElement("button");
    create.className = "fd-btn primary";
    create.textContent = "Create";
    const cancel = document.createElement("button");
    cancel.className = "fd-btn";
    cancel.textContent = "Cancel";
    create.addEventListener("click", async () => {
      if (!name.value.trim()) { name.focus(); return; }
      try {
        const r = await fetch(HTTP_BASE + "/projects", { method: "POST", body: JSON.stringify({ name: name.value, description: desc.value }) });
        const j = await r.json();
        if (j.slug) gotoProject(j.slug);
      } catch (_) {}
    });
    cancel.addEventListener("click", (e) => { e.stopPropagation(); projMenu.classList.remove("open"); });
    name.addEventListener("keydown", (e) => { if (e.key === "Enter") desc.focus(); });
    desc.addEventListener("keydown", (e) => { if (e.key === "Enter") create.click(); });
    row.append(cancel, create);
    form.append(name, desc, row);
    projMenu.appendChild(form);
    name.focus();
  }
  projName.addEventListener("click", async (e) => {
    e.stopPropagation();
    if (!projMenu.classList.toggle("open")) return;
    projMenu.textContent = "";
    const list = await fetchProjects();
    if (!list.some((p) => p.slug === PROJECT)) list.push({ slug: PROJECT, title: PROJECT, description: "" });
    list.forEach((p) => {
      const b = document.createElement("button");
      b.textContent = p.title || p.slug;
      if (p.description) b.title = p.description;
      if (p.slug === PROJECT) b.className = "current";
      b.addEventListener("click", () => gotoProject(p.slug));
      projMenu.appendChild(b);
    });
    const nb = document.createElement("button");
    nb.textContent = "New project…";
    nb.addEventListener("click", (ev) => { ev.stopPropagation(); newProjectForm(); });
    projMenu.appendChild(nb);
  });
  document.addEventListener("click", (e) => { if (!document.getElementById("proj").contains(e.target)) projMenu.classList.remove("open"); });

  const feedwrap = document.getElementById("feedwrap");
  const statusEl = document.getElementById("status");
  const statusText = document.getElementById("statustext");
  const statusLine = document.getElementById("status-line");
  let statusOn = false, statusBg = false, statusDetail = "", twinPaused = false, wsLive = false;
  // one composed sentence for the status bar, from the fold slots
  // (active item / last action / next item) — a single truncation point
  function refreshWorking() {
    const doing = document.getElementById("agent-doing").textContent;
    const act = document.getElementById("agent-act").textContent;
    const plan = document.getElementById("agent-plan").textContent;
    if (statusOn) {
      // the live moment from the agent harness beats the stale last-step line
      const now = statusDetail || act;
      statusLine.textContent = statusBg
        ? ((doing || "working") + (now ? " · " + now : ""))
        : ("thinking…" + (now ? " · " + now : ""));
    } else if (twinPaused) {
      statusLine.textContent = "paused";
    } else {
      // between turns: the agent's own parting line ("resting between checks")
      // beats a bare "idle"; open work reads as waiting on it
      statusLine.textContent = statusDetail
        || ((plan || doing) ? `waiting · ${plan || "on: " + doing}` : "idle");
    }
    // every live line (the agent page's Now, an active plan row) mirrors the
    // moment while the agent computes; the server text is restored afterwards.
    document.querySelectorAll(".agent-live").forEach((el) => {
      if (statusOn) {
        if (el.dataset.srv == null) el.dataset.srv = el.textContent;
        el.textContent = statusDetail || (statusBg ? (act || doing || "working…") : "thinking about your message…");
      } else if (el.dataset.srv != null) {
        el.textContent = el.dataset.srv;
        delete el.dataset.srv;
      }
      const row = el.closest(".now-row");
      if (row) row.classList.toggle("on", statusOn);
    });
  }

  // ---- the run control: the live chip is a dropdown — pause/resume the twin ----
  const statusMenu = document.createElement("div");
  statusMenu.className = "status-menu";
  const menuNote = document.createElement("div");
  menuNote.className = "menu-note";
  const pauseBtn = document.createElement("button");
  statusMenu.append(pauseBtn, menuNote);
  // a bundled shell needs to be told where its twin node lives — the form lives
  // in the live menu, in the app's own grammar (no browser prompt)
  if (!SAME_ORIGIN) {
    const hostBtn = document.createElement("button");
    hostBtn.textContent = "Twin node…";
    hostBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      statusMenu.textContent = "";
      const form = document.createElement("div");
      form.className = "proj-form";
      const host = document.createElement("input");
      host.placeholder = "host:port of your twin node";
      host.value = nodeHost();
      const row = document.createElement("div");
      row.className = "proj-form-row";
      const save = document.createElement("button");
      save.className = "fd-btn primary";
      save.textContent = "Connect";
      save.addEventListener("click", () => {
        localStorage.setItem("twin-host", host.value.trim());
        location.reload();
      });
      host.addEventListener("keydown", (ev) => { if (ev.key === "Enter") save.click(); });
      row.append(save);
      form.append(host, row);
      statusMenu.appendChild(form);
      host.focus();
    });
    statusMenu.appendChild(hostBtn);
  }
  statusEl.appendChild(statusMenu);
  function renderTwinState() {
    statusEl.classList.toggle("paused", twinPaused);
    if (wsLive) statusText.textContent = twinPaused ? "paused" : "live";
    pauseBtn.textContent = twinPaused ? "Resume the twin" : "Pause the twin";
    menuNote.textContent = twinPaused
      ? "It will answer you, but does no work of its own."
      : "Stops background work; it still answers when you write.";
    refreshWorking();
  }
  pauseBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    send({ type: twinPaused ? "resume" : "pause" });
    statusMenu.classList.remove("open");
  });
  statusEl.addEventListener("click", () => statusMenu.classList.toggle("open"));
  document.addEventListener("click", (e) => { if (!statusEl.contains(e.target)) statusMenu.classList.remove("open"); });
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const appEl = document.getElementById("app");
  const stackEl = document.getElementById("stack");
  const convEl = document.querySelector(".conv");

  // draggable column dividers — plain client furniture, no state in the graph
  function makeResizable(el, cls) {
    const rz = document.createElement("div");
    rz.className = cls;
    rz.addEventListener("mousedown", (e) => {
      e.preventDefault();
      const startX = e.clientX, startW = el.getBoundingClientRect().width;
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
      const move = (ev) => { el.style.width = Math.max(320, startW + ev.clientX - startX) + "px"; el.style.flex = "none"; };
      const up = () => {
        window.removeEventListener("mousemove", move);
        window.removeEventListener("mouseup", up);
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      };
      window.addEventListener("mousemove", move);
      window.addEventListener("mouseup", up);
    });
    el.appendChild(rz);
  }
  makeResizable(convEl, "conv-rz");
  const statusbar = document.getElementById("statusbar");

  // On (re)connect the server replays the FULL mutation log — so the DOM must be
  // reset to zero first, or every reconnect (server restart, network blip) would
  // re-create everything on top of what's already rendered: N reconnects = N copies.
  const STATIC_ROOTS = ["feed-root", "skills-root", "agent-plan", "agent-act", "agent-doing", "agent-doing-id", "stars-root", "recents-root"];
  function resetDom() {
    nodes.clear();
    STATIC_ROOTS.forEach((id) => {
      const el = document.getElementById(id);
      el.textContent = "";
      nodes.set(id, el);
    });
    boardRoot.textContent = "";
    nodes.set("board-root", boardRoot);
    panels.length = 0;
    stackEl.textContent = "";
    appEl.classList.remove("split");
  }

  let ws;
  let freshSnapshot = false; // the first batch after (re)connect = full history replay
  function connect() {
    ws = new WebSocket(`${WS_BASE}/ws?project=${encodeURIComponent(PROJECT)}`);
    ws.onopen = () => { resetDom(); freshSnapshot = true; wsLive = true; statusEl.classList.add("live"); renderTwinState(); };
    ws.onclose = () => {
      wsLive = false; statusEl.classList.remove("live"); statusText.textContent = "reconnecting…";
      setTimeout(connect, 1000);
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "mutations") {
        msg.batch.forEach(applyMutation);
        refreshWorking(); // keep the in-progress card current mid-turn
        if (freshSnapshot) {
          // land at NOW — the bottom of the time axis — not at the beginning
          // (re-assert after layout settles: fonts/flex can shift heights late)
          const toBottom = () => { feedwrap.scrollTop = feedwrap.scrollHeight; };
          toBottom();
          requestAnimationFrame(toBottom);
          setTimeout(toBottom, 150);
          setTimeout(toBottom, 400);
          freshSnapshot = false;
        } else {
          autoscroll();
        }
      }
      else if (msg.type === "status") {
        statusOn = !!msg.working; statusBg = !!msg.background;
        statusDetail = String(msg.detail || "");
        statusbar.classList.toggle("on", statusOn);
        refreshWorking();
        autoscroll();
      }
      else if (msg.type === "twin") {
        twinPaused = !!msg.paused;
        renderTwinState();
      }
    };
  }

  const insertAt = (parent, el, i) => parent.insertBefore(el, parent.children[i] || null);
  const SVG_NS = "http://www.w3.org/2000/svg";
  const SVG_TAGS = new Set(["svg", "path", "line", "text", "g", "circle", "rect", "polyline", "polygon"]);

  // ---- the detail stack (Miller columns) ----
  const panels = []; // [{ title, ev, el, isBoard }]
  function removeTopPanels(downTo) {
    while (panels.length > downTo) {
      const p = panels.pop();
      if (p.isBoard) boardRoot.remove(); // detach, keep alive
      nodes.delete(`panel:${panels.length}:sub`);
      p.el.remove();
    }
    appEl.classList.toggle("split", panels.length > 0);
  }
  function mkPanel(i, title, ev) {
    const el = document.createElement("div");
    el.className = "panel";
    const head = document.createElement("div");
    head.className = "panel-head";
    const t = document.createElement("div");
    t.className = "panel-title";
    t.textContent = title || "";
    const p = { title: title || "", ev: ev || null, el, tEl: t, bodyEl: null, isBoard: false };
    const star = document.createElement("button");
    star.className = "panel-btn";
    star.title = "Star this page";
    star.textContent = "☆";
    star.addEventListener("click", () => { if (!p.ev) return; star.textContent = star.textContent === "☆" ? "★" : "☆"; send({ type: "star", title: p.title || "page", target: p.ev }); });
    const close = document.createElement("button");
    close.className = "panel-btn";
    close.title = "Close";
    close.textContent = "×";
    const my = panels.length;
    // closing is an EVENT: the graph clears the column and the close marker echoes
    // back to tear down the chrome — so the open stack is always twin state
    close.addEventListener("click", () => { send({ type: "close_panel", panel: my }); removeTopPanels(my); });
    // on a phone every column is a page: ‹ closes this one and everything above,
    // so the last ‹ lands back in the chat (same event as ×, phone-only chrome)
    const back = document.createElement("button");
    back.className = "panel-btn panel-back";
    back.title = "Back";
    back.textContent = "‹";
    back.addEventListener("click", () => { send({ type: "close_panel", panel: my }); removeTopPanels(my); });
    head.append(back, t, star, close);
    const body = document.createElement("div");
    body.className = "panel-body";
    p.bodyEl = body;
    el.append(head, body);
    makeResizable(el, "panel-rz");
    nodes.set(`panel:${i}:body`, body);
    if (ev && ev.type === "open_board") { p.isBoard = true; body.appendChild(boardRoot); }
    panels.push(p);
    stackEl.appendChild(el);
    appEl.classList.add("split");
    stackEl.scrollLeft = stackEl.scrollWidth;
    return p;
  }
  function openPanel(i, title, ev) {
    removeTopPanels(i);
    mkPanel(i, title, ev);
  }
  // ---- a column's bottom half: alt-click opens things here (a peek that keeps
  // the top page and its selection); the graph addresses it as panel:i:sub ----
  function ensureSub(i, title) {
    const p = panels[i];
    if (!p) return null;
    if (!p.subEl) {
      const wrap = document.createElement("div");
      wrap.className = "panel-sub";
      const head = document.createElement("div");
      head.className = "panel-sub-head";
      const t = document.createElement("div");
      t.className = "panel-title";
      const close = document.createElement("button");
      close.className = "panel-btn";
      close.title = "Close this half";
      close.textContent = "×";
      close.addEventListener("click", () => { send({ type: "close_panel", panel: i, sub: true }); removeSub(i); });
      head.append(t, close);
      const body = document.createElement("div");
      body.className = "panel-sub-body";
      wrap.append(head, body);
      p.el.appendChild(wrap);
      p.el.classList.add("vsplit");
      p.subEl = wrap; p.subTitleEl = t; p.subBodyEl = body;
      nodes.set(`panel:${i}:sub`, body);
    }
    if (title != null) p.subTitleEl.textContent = title;
    return p.subEl;
  }
  function removeSub(i) {
    const p = panels[i];
    if (!p || !p.subEl) return;
    p.subEl.remove();
    p.el.classList.remove("vsplit");
    p.subEl = p.subTitleEl = p.subBodyEl = null;
    nodes.delete(`panel:${i}:sub`);
  }
  function syncSub(i, name, value) {
    if (name === "data-title") ensureSub(i, value || "");
    else if (name === "data-closed" && value) { removeSub(i); removeTopPanels(i + 1); }
  }
  // A replaying snapshot references panel bodies before any chrome exists: rebuild
  // the columns from the log's own markers (data-title / data-ev on each body).
  function restorePanel(i) {
    while (panels.length <= i) mkPanel(panels.length, "", null);
  }
  function syncPanel(i, name, value) {
    const p = panels[i];
    if (!p || !value) return;
    if (name === "data-title") { p.title = value; p.tEl.textContent = value; }
    else if (name === "data-ev") {
      try { p.ev = JSON.parse(value); } catch (_) { return; }
      if (p.ev && p.ev.type === "open_board" && !p.isBoard) { p.isBoard = true; p.bodyEl.appendChild(boardRoot); }
    }
    else if (name === "data-closed") removeTopPanels(i);
  }
  // the click that caused an open: remembered so (a) the clicked thing stays
  // visually selected in its own column, and (b) alt-click opens in the SAME
  // column's bottom half — a peek that keeps the top page in place.
  let lastClickEl = null, lastClickAlt = false;
  document.addEventListener("click", (e) => {
    // only elements that actually open something (.opens, marked by wire) count —
    // never the innermost span the pointer happened to land on
    lastClickEl = e.target && e.target.closest ? e.target.closest(".opens") : null;
    lastClickAlt = e.altKey;
  }, true);

  // open anything: create the column, then ask the graph to render into it.
  // (open_board is hosted client-side, but the event is still sent so the user's
  //  action is captured raw and lands in recents like everything else.)
  function openFromEv(i, title, ev) {
    if (lastClickEl) {
      const host = lastClickEl.closest(".panel-body, .panel-sub-body, #board");
      if (host) {
        host.querySelectorAll(".sel").forEach((x) => x.classList.remove("sel"));
        lastClickEl.classList.add("sel");
      }
    }
    if (lastClickAlt && i > 0 && panels[i - 1]) {
      const j = i - 1;
      ensureSub(j, title || "");
      send(Object.assign({}, ev, { panel: j, sub: true, title: title || "" }));
      return;
    }
    openPanel(i, title, ev);
    send(Object.assign({}, ev, { panel: i, title: title || "" }));
  }
  // the status bar opens the Agent page; "the twin ▸" opens the board
  statusbar.addEventListener("click", () => openFromEv(0, "What’s happening", { type: "open_agent" }));
  document.getElementById("status-open").addEventListener("click", (e) => {
    e.stopPropagation();
    openFromEv(0, "The twin", { type: "open_board" });
  });

  // wire the interactions the rendered elements imply. In-panel keys arrive as
  // p<i>:<key>; a link inside column i opens in column i+1 (mode switches replace).
  function wire(el, key) {
    // every click this function attaches marks its element .opens — the
    // selection highlight and the pointer cursor bind to exactly these
    const on = (fn) => { el.addEventListener("click", fn); el.classList.add("opens"); };
    const pm = /^p(\d+)(s?):(.+)$/.exec(key);
    if (pm) {
      const base = Number(pm[1]), k = pm[3], pfx = `p${pm[1]}${pm[2]}:`;
      if (/^tn:[^:]+$/.test(k)) on(() => {
        const nm = el.querySelector(".tree-name, .sens-n");
        openFromEv(base + 1, (nm ? nm.textContent : "Asset"), { type: "open_asset", id: k.slice(3) });
      });
      else if (/^sens:[^:]+$/.test(k)) on(() => { if (el.dataset.series) openFromEv(base + 1, el.dataset.label || "Sensor", { type: "fetch", adapter: el.dataset.adapter || "cognite-datapoints", id: el.dataset.series, label: el.dataset.label || el.dataset.series }); });
      else if (/^exp:r:\d+$/.test(k)) on(() => { if (el.dataset.series) openFromEv(base + 1, el.dataset.label || "Sensor", { type: "fetch", adapter: el.dataset.adapter || "cognite-datapoints", id: el.dataset.series, label: el.dataset.label || el.dataset.series }); });
      else if (k.startsWith("doc:") && !k.includes(":n") && !k.includes(":t")) on(() => openFromEv(base + 1, k.slice(4), { type: "open_document", name: k.slice(4) }));
      else if (k === "exp:codebtn") on(() => { const code = nodes.get(`${pfx}exp:code`); if (code) code.hidden = !code.hidden; });
      else if (k === "fd:src") on(() => openFromEv(base + 1, el.dataset.title || el.dataset.name, { type: "open_source", name: el.dataset.name }));
      else if (/^task:\d+$/.test(k)) on(() => openFromEv(base + 1, el.dataset.title || "Task", { type: "open_task", id: Number(k.slice(5)) }));
      // a story card title / step row opens what it points at: the produced
      // thing, or its step page (log rows are ta:log; card titles are ta:actN:h)
      else if (/^(?:(?:ta|ag):act|ta:log)\d+(?::h)?$/.test(k)) on(() => { if (el.dataset.ev) openFromEv(base + 1, el.dataset.title || "", JSON.parse(el.dataset.ev)); });
      // "every step" reveals the task's full machine log in place
      else if (k === "ta:allbtn") on(() => { const d = nodes.get(`${pfx}ta:all`); if (d) d.hidden = !d.hidden; });
      // on a step's page: the produced thing, and the task the step served
      else if (k === "sp:open") on(() => { if (el.dataset.ev) openFromEv(base + 1, el.dataset.title || "", JSON.parse(el.dataset.ev)); });
      else if (k === "sp:task") on(() => openFromEv(base + 1, "Task", { type: "open_task", id: Number(el.dataset.id) }));
      // a click that DIRECTS the agent is a BRIEF: raw-captured and journaled like
      // every action, but never rendered as user speech — it lands in the agent's
      // plan and wakes it (the chat belongs to the user and the agent's own voice)
      else if (k === "ta:work") on(() => send({ type: "brief", title: el.dataset.text, text: `Take the next concrete step on “${el.dataset.text}” now and show the result.` }));
      else if (k === "ta:done") on(() => {
        send({ type: "set_task", id: Number(el.dataset.id), status: el.dataset.status || "done" });
        openFromEv(base, panels[base] ? panels[base].title : "Task", { type: "open_task", id: Number(el.dataset.id) });
      });
      else if (k === "fd:investigate") on(() => send({ type: "brief", title: `Investigate: ${el.dataset.text}`, text: `Investigate this finding and show the evidence: “${el.dataset.text}”` }));
      // schema gaps have one fix: documentation — buttons and backlog rows brief the agent the same way
      else if (k === "fd:document" || k === "exp:annbtn") on(() => send({ type: "brief", title: `Document the fields of ${el.dataset.title}`, text: `Document the fields of ${el.dataset.title}: annotate every field that still lacks a title with a short human title and a one-sentence meaning. If a field's meaning cannot be read from the data, ask the user.` }));
      else if (/^ag:bk\d+$/.test(k)) on(() => { if (el.dataset.doc) send({ type: "brief", title: `Document the fields of ${el.dataset.doc}`, text: `Document the fields of ${el.dataset.doc} NOW: annotate every field that still lacks a title with a short human title and a one-sentence meaning. If a field's meaning cannot be read from the data, ask the user.` }); });
      else if (k === "fd:fix") on(() => send({ type: "brief", title: `Propose a fix: ${el.dataset.text}`, text: `Propose a concrete fix for this finding: “${el.dataset.text}”` }));
      else if (k === "fd:resolve") on(() => {
        send({ type: "resolve_finding", id: Number(el.dataset.id) });
        openFromEv(base, panels[base] ? panels[base].title : "Finding", { type: "open_finding", id: Number(el.dataset.id) });
      });
      // mode keys are mode:<name>:<mode>, where <name> itself may contain ':' (lens:foo)
      else if (k.startsWith("mode:")) on(() => { const parts = k.split(":"); const mode = parts.pop(); const name = parts.slice(1).join(":"); openFromEv(base, panels[base] ? panels[base].title : name, { type: "open_source", name, mode }); });
      // schema doorways: a reference cell, a field-guide line, or a map node
      else if (k.startsWith("sch:ref:")) on(() => openFromEv(base + 1, el.dataset.title || el.dataset.name, { type: "open_source", name: el.dataset.name, mode: "schema" }));
      else if (/^exp:lp\d+$/.test(k)) on(() => { if (el.dataset.name) openFromEv(base, el.dataset.title || el.dataset.name, { type: "open_source", name: el.dataset.name }); });
      else if (k.startsWith("smn:")) on(() => openFromEv(base + 1, el.dataset.title || k.slice(4), { type: "open_source", name: k.slice(4), mode: "schema" }));
      else if (/^iss:[^:]+:\d+:\d+$/.test(k)) on(() => openFromEv(base + 1, "Asset", { type: "open_asset", id: k.split(":")[1] }));
      return;
    }
    // board tiles live in whichever column hosts the board — open into the next one
    const boardIdx = () => panels.findIndex((p) => p.isBoard);
    if (key === "tile:schemamap") on(() => { const b = boardIdx(); openFromEv(b < 0 ? 0 : b + 1, "Schema map", { type: "open_schema" }); });
    else if (/^sr:[^:]+$/.test(key)) on(() => { const b = boardIdx(); if (b < 0) return; const n = key.slice(3); openFromEv(b + 1, el.dataset.title || n, { type: "open_source", name: n }); });
    else if (/^ln:[^:]+$/.test(key)) on(() => { const b = boardIdx(); if (b < 0) return; const n = "lens:" + key.slice(3); openFromEv(b + 1, el.dataset.title || n, { type: "open_source", name: n }); });
    // a view card in the chat opens the same thing in depth (panel 0)
    else if (/^item:\d+:h$/.test(key)) on(() => { if (el.dataset.ev) openFromEv(0, el.dataset.title || el.textContent, JSON.parse(el.dataset.ev)); });
    // a quoted phrase under an answer opens the source it was read from
    else if (/^item:\d+:q\d+$/.test(key)) on(() => { if (el.dataset.name) openFromEv(0, el.dataset.name, { type: "open_source", name: el.dataset.name }); });
    // recents / starred chips in the header
    else if (/^(rc|st):\d+$/.test(key)) on(() => { if (el.dataset.ev) openFromEv(0, el.dataset.title || "", JSON.parse(el.dataset.ev)); });
    // finding cards on the board open the finding itself
    else if (/^fnd:\d+$/.test(key)) on(() => {
      const b = panels.findIndex((p) => p.isBoard);
      openFromEv(b < 0 ? 0 : b + 1, "Finding", { type: "open_finding", id: Number(key.slice(4)) });
    });
    // tree nodes inside chat cards (unprefixed) open at panel 0
    else if (/^tn:[^:]+$/.test(key)) on(() => {
      const nm = el.querySelector(".tree-name");
      openFromEv(0, (nm ? nm.textContent : "Asset"), { type: "open_asset", id: key.slice(3) });
    });
  }

  function applyMutation(m) {
    switch (m.op) {
      case "create": {
        const el = SVG_TAGS.has(m.tag) ? document.createElementNS(SVG_NS, m.tag) : document.createElement(m.tag);
        el.dataset.key = m.key;
        nodes.set(m.key, el);
        const ps = /^panel:(\d+):sub$/.exec(m.parent);
        if (ps) { restorePanel(Number(ps[1])); ensureSub(Number(ps[1]), null); }
        const parent = nodes.get(m.parent);
        if (parent) insertAt(parent, el, m.index);
        wire(el, m.key);
        if (/(^|:)exp:scroll$/.test(m.key)) wireViewport(el, m.key);
        break;
      }
      case "move": { const el = nodes.get(m.key), p = nodes.get(m.parent); if (el && p) insertAt(p, el, m.index); break; }
      case "setText": { const el = nodes.get(m.key); if (el && document.activeElement !== el) el.textContent = m.text; break; }
      case "setAttr": {
        const pb = /^panel:(\d+):body$/.exec(m.key);
        if (pb) restorePanel(Number(pb[1]));
        const ps = /^panel:(\d+):sub$/.exec(m.key);
        if (ps) { restorePanel(Number(ps[1])); ensureSub(Number(ps[1]), null); }
        const el = nodes.get(m.key);
        // a shell (Tauri) is not same-origin with the node: root-relative documents
        // ("/file/x.pdf") must point back at the node explicitly
        let value = m.value;
        if (!SAME_ORIGIN && (m.name === "src" || m.name === "href") && typeof value === "string" && value.startsWith("/")) {
          value = HTTP_BASE + value;
        }
        if (el) { if (value == null) el.removeAttribute(m.name); else el.setAttribute(m.name, value); }
        if (pb) syncPanel(Number(pb[1]), m.name, m.value);
        if (ps) syncSub(Number(ps[1]), m.name, m.value);
        break;
      }
      case "setProp": { const el = nodes.get(m.key); if (el) el[m.name] = m.value; break; }
      case "remove": { const el = nodes.get(m.key); if (el) el.remove(); nodes.delete(m.key); break; }
      case "listen": {
        const el = nodes.get(m.key);
        if (el && m.key.startsWith("option:")) el.addEventListener("click", () => send({ type: "choose", target: m.key }));
        break;
      }
    }
  }

  // A virtualized table scroller reports WHERE it is (first row + how many fit) so
  // the server can render just that window. Row height is pinned server-side
  // (data-rowh), so the mapping is arithmetic; a little overscan hides the hop.
  function wireViewport(el, key) {
    let timer = null;
    const report = () => {
      timer = null;
      const rowh = Number(el.dataset.rowh) || 0;
      if (!rowh) return; // not a virtualized table
      const pm = /^p(\d+)(s?):/.exec(key);
      if (!pm) return;
      const ev = {
        type: "viewport",
        panel: Number(pm[1]),
        first: Math.max(0, Math.floor(el.scrollTop / rowh) - 8),
        count: Math.ceil(el.clientHeight / rowh) + 16,
      };
      if (pm[2]) ev.sub = true;
      send(ev);
    };
    el.addEventListener("scroll", () => { if (!timer) timer = setTimeout(report, 70); }, { passive: true });
  }

  function autoscroll() {
    if (feedwrap.scrollHeight - feedwrap.scrollTop - feedwrap.clientHeight < 160) {
      feedwrap.scrollTop = feedwrap.scrollHeight;
    }
  }

  function send(ev) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(ev)); }

  function submitMessage() {
    const text = input.value.trim();
    if (!text) return;
    send({ type: "user_message", text });
    input.value = ""; input.style.height = "auto";
  }
  input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = input.scrollHeight + "px"; });
  input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitMessage(); } });
  sendBtn.addEventListener("click", submitMessage);

  // the on-screen keyboard: iOS never resizes the layout viewport for it, so
  // mirror the visual viewport onto the body (the composer rides above the keys)
  // and keep the conversation pinned at NOW while it animates in
  if (window.visualViewport) {
    const vv = window.visualViewport;
    let lastH = vv.height;
    vv.addEventListener("resize", () => {
      if (vv.scale && Math.abs(vv.scale - 1) > 0.01) return; // pinch-zoom, not the keyboard
      document.body.style.height = Math.round(vv.height) + "px";
      window.scrollTo(0, 0);
      if (vv.height < lastH) requestAnimationFrame(() => { feedwrap.scrollTop = feedwrap.scrollHeight; });
      lastH = vv.height;
    });
  }

  connect();
})();
</script>
