<title>Vardøger</title>
<style>
  :root {
    --bg: #faf9f7; --panel: #ffffff; --ink: #22201d; --muted: #8a857c;
    --line: #eae7e1; --accent: #c96442; --accent-soft: #f5e9e3; --user: #eef1f4;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  [hidden] { display: none !important; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.55 -apple-system, "SF Pro Text", system-ui, sans-serif;
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
  }

  /* ---- one header: brand · starred · recents · live ---- */
  .top { display: flex; align-items: center; gap: 14px; padding: 0 18px; height: 50px; background: var(--panel); border-bottom: 1px solid var(--line); flex: none; }
  .brand { font-weight: 650; font-size: 16px; letter-spacing: -0.01em; display: flex; align-items: center; gap: 9px; flex: none; }
  .brand svg { display: block; }
  .chips { display: flex; align-items: center; gap: 6px; min-width: 0; overflow-x: auto; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  #stars-root { flex: none; max-width: 40%; }
  #recents-root { flex: 1; }
  #recents-root:not(:empty)::before { content: "recent"; color: var(--muted); font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; margin-right: 2px; flex: none; }
  .chip { border: 1px solid var(--line); background: var(--bg); color: var(--ink); border-radius: 99px; padding: 4px 12px; font: inherit; font-size: 12px; cursor: pointer; white-space: nowrap; flex: none; transition: border-color .12s, background .12s; }
  .chip:hover { border-color: var(--accent); background: var(--accent-soft); }
  .chip.starred { color: #7a4a38; background: var(--accent-soft); border-color: #eeddd4; }
  .status { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; flex: none; margin-left: auto; }
  .status .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
  .status.live .dot { background: #4a9d5b; }

  /* ---- chat front and center; detail stack slides in on the right ---- */
  .app { flex: 1; min-height: 0; display: flex; overflow: hidden; }
  .conv { position: relative; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--panel); flex: 1; }
  .conv .conv-rz { display: none; }
  .app.split .conv .conv-rz { display: block; }
  .app.split .conv { flex: none; width: 464px; border-right: 1px solid var(--line); }
  .feedwrap { flex: 1; min-height: 0; overflow-y: auto; }
  .feed { max-width: 760px; margin: 0 auto; padding: 22px 24px 8px; display: flex; flex-direction: column; gap: 4px; }
  .feed-item { padding: 8px 0; animation: rise .28s ease; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .feed-item.agent .text { font-size: 15px; }
  .feed-item.user { display: flex; justify-content: flex-end; }
  .feed-item.user .text { background: var(--user); padding: 9px 14px; border-radius: 14px 14px 3px 14px; max-width: 82%; }
  /* the agent's reasoning: a quiet card in normal type — WHY it's about to do
     what it does next. Clamped to two lines; click to unfold. */
  .feed-item.thought { background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 9px 14px; margin: 5px 0; cursor: pointer; }
  .feed-item.thought .text { color: #6b665e; font-size: 13px; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .feed-item.thought .text::before { content: "✳ "; color: var(--accent); }
  .feed-item.thought.open .text { -webkit-line-clamp: unset; }
  .feed-item.system { padding: 4px 0; }
  .feed-item.system .text { display: inline-block; background: var(--accent-soft); color: #7a4a38; font-size: 12.5px; padding: 5px 11px; border-radius: 8px; }
  .feed-item.question { background: var(--bg); border: 1px solid var(--line); border-radius: 14px; padding: 15px 16px; margin: 6px 0; }
  .feed-item.question .q-text { font-weight: 550; margin-bottom: 12px; }
  .q-option { display: block; width: 100%; text-align: left; background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 9px 13px; margin: 6px 0; font: inherit; color: var(--ink); cursor: pointer; transition: background .12s, border-color .12s; }
  .q-option:hover { background: var(--accent-soft); border-color: var(--accent); }

  /* inline agent views — cards in the conversation; the title opens them in depth */
  .feed-item.view { background: var(--bg); border: 1px solid var(--line); border-radius: 14px; padding: 13px 14px; margin: 8px 0; }
  .view-title { font-weight: 550; font-size: 13px; margin-bottom: 10px; }
  .view-title.openable, .card-title.openable { cursor: pointer; }
  .view-title.openable:hover, .card-title.openable:hover { color: var(--accent); }
  /* the "open ↗" affordance only whispers on hover — cards stay quiet at rest */
  .view-title.openable:hover::after, .card-title.openable:hover::after { content: "  open ↗"; color: var(--muted); font-weight: 400; font-size: 11px; }

  /* compact action cards: work that was done, as chat history */
  .feed-item.card { background: var(--bg); border: 1px solid var(--line); border-left: 3px solid var(--line); border-radius: 12px; padding: 10px 14px; margin: 5px 0; }
  .card-title { font-weight: 600; font-size: 13px; }
  .card-sub { color: var(--muted); font-size: 12px; margin-top: 3px; line-height: 1.5; }
  .card-sub:empty, .card-meta:empty { display: none; }
  .card-meta { color: var(--muted); font-size: 11.5px; margin-top: 4px; }
  /* severity is a quiet dot before the title — no loud borders */
  .feed-item.card.sev-info .card-title::before { content: "● "; color: var(--accent); font-size: 9px; vertical-align: 2px; }
  .feed-item.card.sev-warn .card-title::before { content: "● "; color: #d9902a; font-size: 9px; vertical-align: 2px; }
  .feed-item.card.sev-critical .card-title::before { content: "● "; color: #c0392b; font-size: 9px; vertical-align: 2px; }

  /* a finding, opened: severity chip · the issue · where · what you can do */
  .fd-sev { display: inline-block; font-size: 10.5px; text-transform: uppercase; letter-spacing: .07em; font-weight: 600; padding: 3px 10px; border-radius: 99px; margin-bottom: 12px; }
  .fd-sev.sev-info { background: var(--accent-soft); color: #7a4a38; }
  .fd-sev.sev-warn { background: #f7ead4; color: #8a5a14; }
  .fd-sev.sev-critical { background: #f7dcd6; color: #8a2e20; }
  .fd-sev.resolved { background: #e7efe7; color: #3f6b48; }
  .fd-text { font-size: 16px; font-weight: 550; line-height: 1.5; max-width: 56ch; }
  .fd-src { color: #7a4a38; font-size: 13px; margin-top: 12px; cursor: pointer; }
  .fd-src:hover { color: var(--accent); }
  .fd-cta { display: flex; gap: 8px; margin-top: 20px; }
  .fd-btn { border: 1px solid var(--line); background: var(--panel); border-radius: 9px; padding: 7px 15px; font: inherit; font-size: 13px; color: var(--ink); cursor: pointer; transition: border-color .12s, background .12s; }
  .fd-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
  .fd-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .fd-btn.primary:hover { opacity: .9; }
  .fnd { cursor: pointer; }
  .fnd.resolved { opacity: .5; }
  .fnd.resolved > div:first-child { text-decoration: line-through; }

  /* the Agent page: agenda checklist + recent work log */
  .ag-row { display: flex; gap: 10px; align-items: baseline; padding: 6px 8px; border-radius: 8px; font-size: 13.5px; }
  .ag-row:hover { background: var(--panel); }
  .ag-s { flex: none; color: var(--muted); }
  .ag-row.active .ag-s { color: var(--accent); }
  .ag-row.done { opacity: .55; }
  .ag-row.done .ag-t { text-decoration: line-through; }
  .act-row { font-size: 12px; color: var(--muted); padding: 4px 8px; line-height: 1.5; border-bottom: 1px solid var(--line); }
  .act-row:last-child { border-bottom: none; }
  .view-body { min-height: 0; }
  .view-scroll { overflow-x: auto; max-height: 44vh; overflow-y: auto; }
  .feed-item.view .doc-frame { width: 100%; height: 44vh; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
  .feed-item.view .doc-img { max-width: 100%; border: 1px solid var(--line); border-radius: 8px; }

  /* the in-progress card: what's being worked on right now, shaped like the action
     card it will become — the spinner alone says "in progress" */
  .working { max-width: 712px; margin: 0 auto 6px; width: calc(100% - 48px); padding: 10px 14px; display: none; align-items: center; gap: 11px; background: var(--bg); border: 1px dashed var(--line); border-radius: 12px; }
  .working.on { display: flex; }
  .working-body { flex: 1; min-width: 0; }
  .working-title { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .working-sub { color: var(--muted); font-size: 12px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .working-sub:empty { display: none; }
  .spin { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--accent-soft); border-top-color: var(--accent); animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .composer { padding: 8px 18px 0; }
  .composer-inner { max-width: 760px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; background: var(--bg); border: 1px solid var(--line); border-radius: 14px; padding: 8px 8px 8px 14px; }
  .composer textarea { flex: 1; border: none; background: transparent; resize: none; font: inherit; color: var(--ink); outline: none; max-height: 140px; padding: 6px 0; }
  .composer button { border: none; background: var(--accent); color: #fff; border-radius: 10px; width: 34px; height: 34px; font-size: 16px; cursor: pointer; flex: none; }

  /* ---- the status bar (Claude Code-style): background work at a glance ---- */
  .statusbar { max-width: 760px; margin: 0 auto; width: 100%; padding: 7px 24px 10px; font-size: 12px; color: var(--muted); display: flex; align-items: baseline; gap: 9px; cursor: pointer; flex: none; }
  .statusbar:hover #status-open { color: var(--accent); }
  .statusbar > span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .now-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex: none; align-self: center; }
  .statusbar.on .now-dot { background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }
  #agent-now-text { flex: none; }
  #agent-act { max-width: 44ch; }
  #agent-plan { max-width: 36ch; color: #7a4a38; }
  #status-open { flex: none; margin-left: auto; color: var(--muted); }

  /* ---- the detail stack: horizontal columns, Finder-style ---- */
  .stack { flex: 1; min-width: 0; display: none; overflow-x: auto; overflow-y: hidden; background: var(--bg); }
  .app.split .stack { display: flex; }
  .panel { position: relative; width: 520px; flex: none; min-height: 0; display: flex; flex-direction: column; border-right: 1px solid var(--line); background: var(--bg); }
  .panel:last-child { flex: 1 0 auto; border-right: none; }
  .panel-head { display: flex; align-items: center; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--line); flex: none; background: var(--panel); }
  .panel-title { font-weight: 600; font-size: 13.5px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .panel-btn { border: none; background: none; color: var(--muted); font: inherit; font-size: 14px; cursor: pointer; padding: 2px 6px; border-radius: 6px; flex: none; }
  .panel-btn:hover { background: var(--accent-soft); color: var(--accent); }
  /* sticky table headers pin flush to the top: the scroller has NO top padding
     (padding there leaves a see-through strip above a sticky th) */
  .panel-body { flex: 1; min-height: 0; overflow: auto; padding: 0 16px 16px; }
  .panel-body > *:first-child { margin-top: 14px; }
  .panel-body > table:first-child { margin-top: 0; }
  /* draggable divider on every column's right edge (and the chat's) */
  .panel-rz, .conv-rz { position: absolute; top: 0; right: -3px; width: 7px; height: 100%; cursor: col-resize; z-index: 6; }
  .panel-rz:hover, .conv-rz:hover { background: linear-gradient(to right, transparent 2px, var(--accent) 3px, transparent 5px); }

  /* board (inside its panel): the twin as a grid of lens tiles */
  .board-grid { display: grid; grid-template-columns: 1fr; gap: 10px; align-items: start; }
  #board-root:empty::after {
    content: "Your twin is empty. Point the agent at data, or just talk to it — every source it mounts and every lens it builds appears here, with its lineage.";
    display: block; color: var(--muted); font-size: 13px; font-style: italic; line-height: 1.6;
  }
  #board-root > div { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 13px 15px; transition: border-color .12s, background .12s; }
  #board-root > .src-row { cursor: pointer; }
  #board-root > .src-row:hover { border-color: var(--accent); background: var(--accent-soft); }
  .src-n { font-size: 14px; font-weight: 600; }
  .src-desc { font-size: 12.5px; color: var(--ink); margin-top: 5px; line-height: 1.45; }
  .src-d { font-size: 11.5px; color: var(--muted); margin-top: 7px; }
  .tile-h { font-size: 13.5px; font-weight: 600; margin-bottom: 8px; }
  .lens-code { font-family: ui-monospace, "SF Mono", monospace; font-size: 11px; line-height: 1.6; background: #f4f2ee; border: 1px solid var(--line); padding: 10px 12px; border-radius: 8px; margin: 2px 0 12px; white-space: pre-wrap; word-break: break-word; color: #55504a; max-height: 200px; overflow-y: auto; }
  /* the derivation breadcrumb: quiet, one type size, code behind a toggle */
  .lens-chain { font-size: 12px; color: var(--muted); margin: 6px 0 12px; display: flex; align-items: baseline; flex-wrap: wrap; gap: 6px; }
  .chain-part { color: var(--ink); }
  .chain-part.here { font-weight: 600; }
  .chain-sep { color: var(--muted); }
  .code-toggle { margin-left: 8px; border: 1px solid var(--line); background: var(--panel); border-radius: 7px; padding: 1px 9px; font-family: ui-monospace, "SF Mono", monospace; font-size: 10.5px; color: var(--muted); cursor: pointer; }
  .code-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .fnd-list { max-height: 300px; overflow-y: auto; }
  .fnd { border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; margin: 6px 0; font-size: 12.5px; background: var(--bg); }
  .fnd:hover { border-color: var(--accent); }
  .fnd.sev-info > div:first-child::before { content: "● "; color: var(--accent); font-size: 8px; vertical-align: 2px; }
  .fnd.sev-warn > div:first-child::before { content: "● "; color: #d9902a; font-size: 8px; vertical-align: 2px; }
  .fnd.sev-critical > div:first-child::before { content: "● "; color: #c0392b; font-size: 8px; vertical-align: 2px; }
  .fnd-m { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .pf-row { display: grid; grid-template-columns: 88px 1fr; gap: 8px; padding: 4px 0; }
  .pf-k { color: var(--muted); font-size: 12px; text-transform: capitalize; }
  .pf-v { font-size: 13px; }

  /* content lenses inside panels */
  .panel-body table, .view-body table { border-collapse: collapse; width: 100%; font-size: 12.5px; }
  .panel-body th, .view-body th { text-align: left; position: sticky; top: 0; background: var(--bg); color: var(--muted); font-weight: 500; padding: 7px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  .panel-body td, .view-body td { padding: 5px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; max-width: 300px; overflow: hidden; text-overflow: ellipsis; }
  .panel-body tr:hover td, .view-body tr:hover td { background: var(--panel); }
  .explorer-note { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .panel-body .chartable { cursor: pointer; }
  .panel-body .chartable:hover td { background: var(--accent-soft); }
  .chart { width: 100%; height: auto; max-height: 66vh; display: block; }
  .chart-line { fill: none; stroke: var(--accent); stroke-width: 1.5; }
  .chart-axis { stroke: var(--line); stroke-width: 1; }
  .chart-lbl { fill: var(--muted); font-size: 11px; text-anchor: end; }
  .chart-bar { fill: var(--accent); opacity: .82; }
  .chart-xlbl { fill: var(--muted); font-size: 11px; }
  .chart-xlbl.endlbl { text-anchor: end; }
  .view-modes { display: flex; gap: 6px; margin-bottom: 14px; }
  .mode-btn { border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 5px 13px; font: inherit; font-size: 12.5px; color: var(--muted); cursor: pointer; }
  .mode-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--ink); }
  .tree { font-size: 13px; line-height: 1.5; }
  .tree-node { padding: 3px 6px; white-space: nowrap; cursor: pointer; border-radius: 5px; }
  .tree-node:hover { background: var(--accent-soft); }
  .tree-name { font-weight: 550; }
  .tree-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; border: 1.5px solid var(--muted); margin-right: 9px; vertical-align: middle; }
  .tree-dot.on { background: var(--accent); border-color: var(--accent); }
  .tree-badge { color: var(--muted); font-size: 11px; }
  .ad-name { font-size: 19px; font-weight: 650; margin-top: 2px; }
  .ad-desc { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .ad-section { font-size: 11.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; margin: 22px 0 10px; }
  .ad-empty { color: var(--muted); font-style: italic; font-size: 13px; }
  .sens-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .sens-row { border: 1px solid var(--line); border-radius: 9px; padding: 9px 12px; cursor: pointer; background: var(--panel); transition: border-color .12s, background .12s; }
  .sens-row:hover { border-color: var(--accent); background: var(--accent-soft); }
  .sens-n { font-size: 12.5px; font-weight: 500; }
  .sens-u { color: var(--muted); font-size: 12px; }
  .issue-card { border: 1px solid var(--line); border-left: 3px solid var(--line); border-radius: 9px; padding: 9px 12px; cursor: pointer; background: var(--panel); transition: background .12s; }
  .issue-card:hover { background: var(--accent-soft); }
  .issue-card.sev-amber { border-left-color: #d9902a; }
  .issue-card.sev-blue { border-left-color: var(--accent); }
  .doc-gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .doc-item { border: 1px solid var(--line); border-radius: 10px; padding: 13px; cursor: pointer; background: var(--panel); transition: border-color .12s, background .12s; }
  .doc-item:hover { border-color: var(--accent); background: var(--accent-soft); }
  .doc-name { font-size: 13px; font-weight: 550; word-break: break-all; }
  .doc-type { font-size: 11.5px; color: var(--muted); margin-top: 4px; }
  .doc-frame { width: 100%; height: 74vh; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
  .doc-img { max-width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
</style>

<header class="top">
  <div class="brand">
    <svg width="21" height="21" viewBox="0 0 24 24" aria-hidden="true">
      <!-- the vardøger: the twin that walks ahead — a leading self and its echo -->
      <circle cx="14.5" cy="11" r="7" fill="none" stroke="#c96442" stroke-width="2.2"/>
      <circle cx="8" cy="13.5" r="7" fill="none" stroke="#c96442" stroke-width="1.2" opacity="0.45"/>
    </svg>
    Vardøger
  </div>
  <div class="chips" id="stars-root"></div>
  <div class="chips" id="recents-root"></div>
  <div class="status" id="status"><span class="dot"></span><span id="statustext">connecting…</span></div>
</header>

<div class="app" id="app">
  <!-- the conversation: front and center, time as the vertical axis -->
  <section class="conv">
    <div class="feedwrap" id="feedwrap"><div class="feed" id="feed-root"></div></div>
    <div class="working" id="working">
      <span class="spin"></span>
      <div class="working-body">
        <div class="working-title" id="working-title">Working…</div>
        <div class="working-sub" id="working-text"></div>
      </div>
    </div>
    <div class="composer" id="composer">
      <div class="composer-inner">
        <textarea id="input" rows="1" placeholder="Ask, steer, or point the agent at data…"></textarea>
        <button id="send" title="Send">↑</button>
      </div>
    </div>
    <!-- the status bar: what's running in the background — click to open the twin -->
    <div class="statusbar" id="statusbar" title="See what the agent is doing">
      <span class="now-dot"></span>
      <span id="agent-now-text">idle</span>
      <span id="agent-act"></span>
      <span id="agent-plan"></span>
      <span id="agent-doing" hidden></span>
      <span id="status-open">the twin ▸</span>
    </div>
  </section>

  <!-- the detail stack: everything you open lands here, columns push right -->
  <div class="stack" id="stack"></div>
</div>
<div id="skills-root" hidden></div>

<script>
(() => {
  "use strict";
  // Thin host: keep Map<Key,Node>, apply the forward mutation IR (§11.3), send back
  // the backward event stream (§11.4).  The detail stack's panel chrome (title /
  // star / close) is client furniture; panel BODIES are registered as roots the
  // server renders into with p<i>:-prefixed keys.
  const nodes = new Map();
  ["feed-root", "skills-root", "agent-plan", "agent-act", "agent-doing", "stars-root", "recents-root"]
    .forEach((id) => nodes.set(id, document.getElementById(id)));

  // the twin board is a LIVE node: it exists detached from birth, grows as the agent
  // works, and is simply adopted by a panel when opened (and orphaned on close).
  const boardRoot = document.createElement("div");
  boardRoot.id = "board-root";
  boardRoot.className = "board-grid";
  nodes.set("board-root", boardRoot);

  const feedwrap = document.getElementById("feedwrap");
  const statusEl = document.getElementById("status");
  const statusText = document.getElementById("statustext");
  const workingEl = document.getElementById("working");
  const workingText = document.getElementById("working-text");
  const workingTitle = document.getElementById("working-title");
  let statusOn = false, statusBg = false;
  // the in-progress card: title = the ACTIVE agenda item (what it's working on),
  // sub = the latest activity note — refreshed live as folds update the slots
  function refreshWorking() {
    if (!statusOn) return;
    const doing = document.getElementById("agent-doing").textContent;
    workingTitle.textContent = statusBg ? (doing || "Working on the twin") : "Thinking";
    workingText.textContent = document.getElementById("agent-act").textContent;
  }
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const appEl = document.getElementById("app");
  const stackEl = document.getElementById("stack");
  const convEl = document.querySelector(".conv");

  // draggable column dividers — plain client furniture, no state in the graph
  function makeResizable(el, cls) {
    const rz = document.createElement("div");
    rz.className = cls;
    rz.addEventListener("mousedown", (e) => {
      e.preventDefault();
      const startX = e.clientX, startW = el.getBoundingClientRect().width;
      document.body.style.cursor = "col-resize";
      document.body.style.userSelect = "none";
      const move = (ev) => { el.style.width = Math.max(320, startW + ev.clientX - startX) + "px"; el.style.flex = "none"; };
      const up = () => {
        window.removeEventListener("mousemove", move);
        window.removeEventListener("mouseup", up);
        document.body.style.cursor = "";
        document.body.style.userSelect = "";
      };
      window.addEventListener("mousemove", move);
      window.addEventListener("mouseup", up);
    });
    el.appendChild(rz);
  }
  makeResizable(convEl, "conv-rz");
  const statusbar = document.getElementById("statusbar");
  const agentNowText = document.getElementById("agent-now-text");

  // On (re)connect the server replays the FULL mutation log — so the DOM must be
  // reset to zero first, or every reconnect (server restart, network blip) would
  // re-create everything on top of what's already rendered: N reconnects = N copies.
  const STATIC_ROOTS = ["feed-root", "skills-root", "agent-plan", "agent-act", "agent-doing", "stars-root", "recents-root"];
  function resetDom() {
    nodes.clear();
    STATIC_ROOTS.forEach((id) => {
      const el = document.getElementById(id);
      el.textContent = "";
      nodes.set(id, el);
    });
    boardRoot.textContent = "";
    nodes.set("board-root", boardRoot);
    panels.length = 0;
    stackEl.textContent = "";
    appEl.classList.remove("split");
  }

  let ws;
  let freshSnapshot = false; // the first batch after (re)connect = full history replay
  function connect() {
    ws = new WebSocket(`ws://${location.host}/ws`);
    ws.onopen = () => { resetDom(); freshSnapshot = true; statusEl.classList.add("live"); statusText.textContent = "live"; };
    ws.onclose = () => {
      statusEl.classList.remove("live"); statusText.textContent = "reconnecting…";
      setTimeout(connect, 1000);
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === "mutations") {
        msg.batch.forEach(applyMutation);
        refreshWorking(); // keep the in-progress card current mid-turn
        if (freshSnapshot) {
          // land at NOW — the bottom of the time axis — not at the beginning
          // (re-assert after layout settles: fonts/flex can shift heights late)
          const toBottom = () => { feedwrap.scrollTop = feedwrap.scrollHeight; };
          toBottom();
          requestAnimationFrame(toBottom);
          setTimeout(toBottom, 150);
          setTimeout(toBottom, 400);
          freshSnapshot = false;
        } else {
          autoscroll();
        }
      }
      else if (msg.type === "status") {
        statusOn = !!msg.working; statusBg = !!msg.background;
        workingEl.classList.toggle("on", statusOn);
        statusbar.classList.toggle("on", statusOn);
        agentNowText.textContent = statusOn ? (statusBg ? "working" : "thinking") : "idle";
        refreshWorking();
        autoscroll();
      }
    };
  }

  const insertAt = (parent, el, i) => parent.insertBefore(el, parent.children[i] || null);
  const SVG_NS = "http://www.w3.org/2000/svg";
  const SVG_TAGS = new Set(["svg", "path", "line", "text", "g", "circle", "rect", "polyline", "polygon"]);

  // ---- the detail stack (Miller columns) ----
  const panels = []; // [{ title, ev, el, isBoard }]
  function removeTopPanels(downTo) {
    while (panels.length > downTo) {
      const p = panels.pop();
      if (p.isBoard) boardRoot.remove(); // detach, keep alive
      p.el.remove();
    }
    appEl.classList.toggle("split", panels.length > 0);
  }
  function mkPanel(i, title, ev) {
    const el = document.createElement("div");
    el.className = "panel";
    const head = document.createElement("div");
    head.className = "panel-head";
    const t = document.createElement("div");
    t.className = "panel-title";
    t.textContent = title || "";
    const p = { title: title || "", ev: ev || null, el, tEl: t, bodyEl: null, isBoard: false };
    const star = document.createElement("button");
    star.className = "panel-btn";
    star.title = "Star this page";
    star.textContent = "☆";
    star.addEventListener("click", () => { if (!p.ev) return; star.textContent = star.textContent === "☆" ? "★" : "☆"; send({ type: "star", title: p.title || "page", target: p.ev }); });
    const close = document.createElement("button");
    close.className = "panel-btn";
    close.title = "Close";
    close.textContent = "×";
    const my = panels.length;
    // closing is an EVENT: the graph clears the column and the close marker echoes
    // back to tear down the chrome — so the open stack is always twin state
    close.addEventListener("click", () => { send({ type: "close_panel", panel: my }); removeTopPanels(my); });
    head.append(t, star, close);
    const body = document.createElement("div");
    body.className = "panel-body";
    p.bodyEl = body;
    el.append(head, body);
    makeResizable(el, "panel-rz");
    nodes.set(`panel:${i}:body`, body);
    if (ev && ev.type === "open_board") { p.isBoard = true; body.appendChild(boardRoot); }
    panels.push(p);
    stackEl.appendChild(el);
    appEl.classList.add("split");
    stackEl.scrollLeft = stackEl.scrollWidth;
    return p;
  }
  function openPanel(i, title, ev) {
    removeTopPanels(i);
    mkPanel(i, title, ev);
  }
  // A replaying snapshot references panel bodies before any chrome exists: rebuild
  // the columns from the log's own markers (data-title / data-ev on each body).
  function restorePanel(i) {
    while (panels.length <= i) mkPanel(panels.length, "", null);
  }
  function syncPanel(i, name, value) {
    const p = panels[i];
    if (!p || !value) return;
    if (name === "data-title") { p.title = value; p.tEl.textContent = value; }
    else if (name === "data-ev") {
      try { p.ev = JSON.parse(value); } catch (_) { return; }
      if (p.ev && p.ev.type === "open_board" && !p.isBoard) { p.isBoard = true; p.bodyEl.appendChild(boardRoot); }
    }
    else if (name === "data-closed") removeTopPanels(i);
  }
  // open anything: create the column, then ask the graph to render into it.
  // (open_board is hosted client-side, but the event is still sent so the user's
  //  action is captured raw and lands in recents like everything else.)
  function openFromEv(i, title, ev) {
    openPanel(i, title, ev);
    send(Object.assign({}, ev, { panel: i, title: title || "" }));
  }
  // the status bar opens the tidy Agent page; the "the twin ▸" corner opens the board
  statusbar.addEventListener("click", () => openFromEv(0, "Agent", { type: "open_agent" }));
  document.getElementById("status-open").addEventListener("click", (e) => {
    e.stopPropagation();
    openFromEv(0, "The twin", { type: "open_board" });
  });

  // wire the interactions the rendered elements imply. In-panel keys arrive as
  // p<i>:<key>; a link inside column i opens in column i+1 (mode switches replace).
  function wire(el, key) {
    const pm = /^p(\d+):(.+)$/.exec(key);
    if (pm) {
      const base = Number(pm[1]), k = pm[2];
      if (/^tn:[^:]+$/.test(k)) el.addEventListener("click", () => {
        const nm = el.querySelector(".tree-name, .sens-n");
        openFromEv(base + 1, (nm ? nm.textContent : "Asset"), { type: "open_asset", id: k.slice(3) });
      });
      else if (/^sens:[^:]+$/.test(k)) el.addEventListener("click", () => { if (el.dataset.series) openFromEv(base + 1, el.dataset.label || "Sensor", { type: "fetch", adapter: el.dataset.adapter || "cognite-datapoints", id: el.dataset.series, label: el.dataset.label || el.dataset.series }); });
      else if (/^exp:r:\d+$/.test(k)) el.addEventListener("click", () => { if (el.dataset.series) openFromEv(base + 1, el.dataset.label || "Sensor", { type: "fetch", adapter: el.dataset.adapter || "cognite-datapoints", id: el.dataset.series, label: el.dataset.label || el.dataset.series }); });
      else if (k.startsWith("doc:") && !k.includes(":n") && !k.includes(":t")) el.addEventListener("click", () => openFromEv(base + 1, k.slice(4), { type: "open_document", name: k.slice(4) }));
      else if (k === "exp:codebtn") el.addEventListener("click", () => { const code = nodes.get(`p${base}:exp:code`); if (code) code.hidden = !code.hidden; });
      else if (k === "fd:src") el.addEventListener("click", () => openFromEv(base + 1, el.dataset.title || el.dataset.name, { type: "open_source", name: el.dataset.name }));
      else if (k === "fd:investigate") el.addEventListener("click", () => send({ type: "user_message", text: `Investigate this finding and show me the evidence: “${el.dataset.text}”` }));
      else if (k === "fd:fix") el.addEventListener("click", () => send({ type: "user_message", text: `Propose a concrete fix for this finding: “${el.dataset.text}”` }));
      else if (k === "fd:resolve") el.addEventListener("click", () => {
        send({ type: "resolve_finding", id: Number(el.dataset.id) });
        openFromEv(base, panels[base] ? panels[base].title : "Finding", { type: "open_finding", id: Number(el.dataset.id) });
      });
      else if (k.startsWith("mode:")) el.addEventListener("click", () => { const [, name, mode] = k.split(":"); openFromEv(base, panels[base] ? panels[base].title : name, { type: "open_source", name, mode }); });
      else if (/^iss:[^:]+:\d+:\d+$/.test(k)) el.addEventListener("click", () => openFromEv(base + 1, "Asset", { type: "open_asset", id: k.split(":")[1] }));
      return;
    }
    // board tiles live in whichever column hosts the board — open into the next one
    const boardIdx = () => panels.findIndex((p) => p.isBoard);
    if (/^sr:[^:]+$/.test(key)) el.addEventListener("click", () => { const b = boardIdx(); if (b < 0) return; const n = key.slice(3); openFromEv(b + 1, el.dataset.title || n, { type: "open_source", name: n }); });
    else if (/^ln:[^:]+$/.test(key)) el.addEventListener("click", () => { const b = boardIdx(); if (b < 0) return; const n = "lens:" + key.slice(3); openFromEv(b + 1, el.dataset.title || n, { type: "open_source", name: n }); });
    // a view card in the chat opens the same thing in depth (panel 0)
    else if (/^item:\d+:h$/.test(key)) el.addEventListener("click", () => { if (el.dataset.ev) openFromEv(0, el.dataset.title || el.textContent, JSON.parse(el.dataset.ev)); });
    // recents / starred chips in the header
    else if (/^(rc|st):\d+$/.test(key)) el.addEventListener("click", () => { if (el.dataset.ev) openFromEv(0, el.dataset.title || "", JSON.parse(el.dataset.ev)); });
    // finding cards on the board open the finding itself
    else if (/^fnd:\d+$/.test(key)) el.addEventListener("click", () => {
      const b = panels.findIndex((p) => p.isBoard);
      openFromEv(b < 0 ? 0 : b + 1, "Finding", { type: "open_finding", id: Number(key.slice(4)) });
    });
    // tree nodes inside chat cards (unprefixed) open at panel 0
    else if (/^tn:[^:]+$/.test(key)) el.addEventListener("click", () => {
      const nm = el.querySelector(".tree-name");
      openFromEv(0, (nm ? nm.textContent : "Asset"), { type: "open_asset", id: key.slice(3) });
    });
  }

  function applyMutation(m) {
    switch (m.op) {
      case "create": {
        const el = SVG_TAGS.has(m.tag) ? document.createElementNS(SVG_NS, m.tag) : document.createElement(m.tag);
        el.dataset.key = m.key;
        nodes.set(m.key, el);
        const parent = nodes.get(m.parent);
        if (parent) insertAt(parent, el, m.index);
        wire(el, m.key);
        break;
      }
      case "move": { const el = nodes.get(m.key), p = nodes.get(m.parent); if (el && p) insertAt(p, el, m.index); break; }
      case "setText": { const el = nodes.get(m.key); if (el && document.activeElement !== el) el.textContent = m.text; break; }
      case "setAttr": {
        const pb = /^panel:(\d+):body$/.exec(m.key);
        if (pb) restorePanel(Number(pb[1]));
        const el = nodes.get(m.key);
        if (el) { if (m.value == null) el.removeAttribute(m.name); else el.setAttribute(m.name, m.value); }
        if (pb) syncPanel(Number(pb[1]), m.name, m.value);
        break;
      }
      case "setProp": { const el = nodes.get(m.key); if (el) el[m.name] = m.value; break; }
      case "remove": { const el = nodes.get(m.key); if (el) el.remove(); nodes.delete(m.key); break; }
      case "listen": {
        const el = nodes.get(m.key);
        if (el && m.key.startsWith("option:")) el.addEventListener("click", () => send({ type: "choose", target: m.key }));
        break;
      }
    }
  }

  function autoscroll() {
    if (feedwrap.scrollHeight - feedwrap.scrollTop - feedwrap.clientHeight < 160) {
      feedwrap.scrollTop = feedwrap.scrollHeight;
    }
  }

  function send(ev) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(ev)); }

  function submitMessage() {
    const text = input.value.trim();
    if (!text) return;
    send({ type: "user_message", text });
    input.value = ""; input.style.height = "auto";
  }
  // thoughts unfold on click (they render clamped to one line)
  feedwrap.addEventListener("click", (e) => {
    const th = e.target.closest(".feed-item.thought");
    if (th) th.classList.toggle("open");
  });

  input.addEventListener("input", () => { input.style.height = "auto"; input.style.height = input.scrollHeight + "px"; });
  input.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitMessage(); } });
  sendBtn.addEventListener("click", submitMessage);

  connect();
})();
</script>
